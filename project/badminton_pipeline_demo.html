                      <span style={{fontSize:9,fontFamily:M,color:'#64748b'}}>
                        {activeShot.hit_type_pred &&
                          <span style={{color:'#a78bfa'}}>{activeShot.hit_type_pred} · </span>}
                        conf <span style={{color:confColor,fontWeight:700}}>{confPct}%</span>
                      </span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                      <span style={{fontSize:20}}>{si.icon||'?'}</span>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,fontFamily:F,
                          color:si.color||'#e2e8f0'}}>{si.label||strat}</div>
                        <div style={{width:200,height:4,background:'#1e293b',
                          borderRadius:2,marginTop:4}}>
                          <div style={{width:`${confPct}%`,height:'100%',
                            background:confColor,borderRadius:2,transition:'width 0.3s'}}/>
                        </div>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4}}>
                      {stratKeys.map(s=>{
                        const p   = probs[s] || 0;
                        const pct = Math.round(p * 100);
                        const si2 = STRAT[s];
                        const top = s === strat;
                        return (
                          <div key={s} style={{textAlign:'center',borderRadius:4,padding:'4px 2px',
                            background: top ? `${si2.color}18` : 'transparent',
                            border: top ? `1px solid ${si2.color}55` : '1px solid transparent'}}>
                            <div style={{fontSize:8,color:si2.color,fontFamily:M,
                              fontWeight:top?700:400,whiteSpace:'nowrap',overflow:'hidden',
                              textOverflow:'ellipsis'}}>{si2.label.split(' ')[0]}</div>
                            <div style={{fontSize:12,color:top?si2.color:'#475569',
                              fontFamily:M,fontWeight:600}}>{pct}%</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })() : null}

              {/* ── Shot-type classifier prediction panel ── */}
              {activeShot.pred_shot_type ? (()=>{
                const predType  = activeShot.pred_shot_type;
                const trueType  = SS_SHOT_TYPE_EN[activeShot.shot_type]||activeShot.shot_type;
                const correct   = activeShot.pred_correct;
                const probs     = activeShot.pred_probs || {};
                const topProb   = Math.max(...Object.values(probs));
                const confPct   = Math.round(topProb * 100);
                const confColor = topProb >= 0.7 ? '#10b981' : topProb >= 0.5 ? '#f59e0b' : '#ef4444';
                const predColor = correct ? '#10b981' : '#ef4444';
                return (
                  <div style={{marginTop:8,background:'#0f172a',borderRadius:8,
                    border:`1px solid ${predColor}44`,padding:'10px 14px'}}>
                    <div style={{display:'flex',alignItems:'center',
                      justifyContent:'space-between',marginBottom:8}}>
                      <span style={{fontSize:9,fontFamily:M,color:'#64748b',letterSpacing:1}}>
                        PREDICTED SHOT TYPE</span>
                      <span style={{fontSize:9,fontFamily:M,color:predColor,fontWeight:700}}>
                        {correct ? '✓ CORRECT' : '✗ WRONG'}
                      </span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                      <div style={{fontSize:14,fontWeight:700,fontFamily:F,color:predColor}}>
                        {predType}
                      </div>
                      <div style={{fontSize:10,color:'#64748b',fontFamily:M}}>
                        conf <span style={{color:confColor,fontWeight:700}}>{confPct}%</span>
                      </div>
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {Object.entries(probs).sort((a,b)=>b[1]-a[1]).map(([name,p])=>{
                        const pct = Math.round(p * 100);
                        const isTop = name === predType;
                        const isTrue = name === trueType;
                        return (
                          <div key={name} style={{textAlign:'center',borderRadius:4,padding:'3px 6px',
                            background: isTop ? `${predColor}18` : 'transparent',
                            border: isTrue ? `1px solid #60a5fa55` : isTop ? `1px solid ${predColor}55` : '1px solid transparent'}}>
                            <div style={{fontSize:8,color:isTop?predColor:isTrue?'#60a5fa':'#475569',
                              fontFamily:M,fontWeight:isTop||isTrue?700:400,whiteSpace:'nowrap'}}>{name}</div>
                            <div style={{fontSize:11,color:isTop?predColor:isTrue?'#60a5fa':'#475569',
                              fontFamily:M,fontWeight:600}}>{pct}%</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })() : null}
            </>
          ) : (
            <div style={{background:'#0f172a',borderRadius:10,border:'1px solid #1e293b',
              padding:40,textAlign:'center',color:'#475569',fontSize:12,
              width:760,height:427,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {shotsLoading ? (
                <div><div className="spin" style={{width:24,height:24,border:'3px solid #334155',
                  borderTopColor:'#60a5fa',borderRadius:'50%',margin:'0 auto 8px'}}/> Loading match…</div>
              ) : selMatch ? 'Loading rally…' : 'Select a match'}
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ─── TAB: FINEBADMINTON ────────────────────────────────────────────────────────
function FBTab() {
  const { online, shots, loading }     = useRealFrames();
  const [selRally,    setSelRally]     = useState(null);
  const [selShotIdx,  setSelShotIdx]   = useState(0);
  const [scrubFrame,  setScrubFrame]   = useState(null);
  const [rallyMeta,   setRallyMeta]    = useState(null);
  const [skelMode,    setSkelMode]     = useState('gdino');
  const [gdinoRallies,setGdinoRallies] = useState([]);
  const [fbPreds,     setFbPreds]      = useState(null);
  const [inferLoading,setInferLoading] = useState(false);
  const [expandedMatch,setExpandedMatch]= useState(null);
  const [topK,        setTopK]         = useState(1);  // top-K accuracy mode

  // rally_id → [shots] map
  const rallyMap = useMemo(() => {
    const m = {};
    shots.forEach(s => { if(!m[s.video]) m[s.video]=[]; m[s.video].push(s); });
    return m;
  }, [shots]);

  // match_id → [rally_id, ...] map
  const matchGroups = useMemo(() => {
    const g = {};
    Object.keys(rallyMap).sort().forEach(rid => {
      const match = rid.split('_')[0];
      if (!g[match]) g[match] = [];
      g[match].push(rid);
    });
    return g;
  }, [rallyMap]);

  const matches = useMemo(() => Object.keys(matchGroups).sort(), [matchGroups]);

  // Auto-select first match + rally
  useEffect(() => {
    if (matches.length > 0 && !selRally) {
      const m = matches[0];
      setExpandedMatch(m);
      setSelRally(matchGroups[m][0]);
    }
  }, [matches]);

  const rallyShots  = selRally ? (rallyMap[selRally] || []) : [];
  const currentShot = rallyShots[selShotIdx] || null;

  // predictions keyed by rally_id|hit_frame
  const predByKey = useMemo(() => {
    if (!fbPreds) return {};
    const m = {};
    fbPreds.forEach(p => { m[`${p.rally_id}|${p.hit_frame}`] = p; });
    return m;
  }, [fbPreds]);

  // predictions for the currently selected rally
  const rallyPreds = useMemo(() =>
    fbPreds ? fbPreds.filter(p => p.rally_id === selRally) : [],
  [fbPreds, selRally]);

  // Check if FB label appears in the top-K predictions (best match across positions)
  const topKMatch = (pred, k) => {
    const truth = pred.fb_label_en;
    if (!truth || !pred.top5) return 'none';
    let best = 'none';
    for (let i = 0; i < Math.min(k, pred.top5.length); i++) {
      const m = semMatch(pred.top5[i][0], truth);
      if (m === 'exact') return 'exact';
      if (m === 'semantic') best = 'semantic';
    }
    return best;
  };

  const rallyScore = useMemo(() => {
    if (!rallyPreds.length) return null;
    let exact = 0, sem = 0;
    rallyPreds.forEach(p => {
      const m = topKMatch(p, topK);
      if (m === 'exact') exact++;
      else if (m === 'semantic') sem++;
    });
    const n = rallyPreds.length;
    return { exact, sem, none: n-exact-sem, n, exactPct: exact/n, semPct:(exact+sem)/n };
  }, [rallyPreds, topK]);

  // Overall accuracy across ALL predictions (not just the selected rally)
  const overallScore = useMemo(() => {
    if (!fbPreds?.length) return null;
    let exact = 0, sem = 0;
    fbPreds.forEach(p => {
      const m = topKMatch(p, topK);
      if (m === 'exact') exact++;
      else if (m === 'semantic') sem++;
    });
    const n = fbPreds.length;
    return { exact, sem, n, exactPct: exact/n, semPct:(exact+sem)/n };
  }, [fbPreds, topK]);

  const loadInference = () => {
    if (inferLoading) return;
    setInferLoading(true);
    fetch(`${SERVER}/api/fb/infer_all`)
      .then(r => r.json())
      .then(data => { setFbPreds(data); setInferLoading(false); })
      .catch(() => { setFbPreds([]); setInferLoading(false); });
  };

  useEffect(() => {
    if (!selRally) return;
    fetch(`${SERVER}/api/rally/${selRally}`)
      .then(r=>r.json()).then(setRallyMeta).catch(()=>setRallyMeta(null));
  }, [selRally]);

  useEffect(() => {
    fetch(`${SERVER}/api/gdino_rallies`)
      .then(r=>r.json()).then(d=>setGdinoRallies(d.rallies||[])).catch(()=>{});
  }, []);

  useEffect(() => { setScrubFrame(null); }, [currentShot?.id]);

  const frameHitter = useMemo(() => {
    if (!scrubFrame || !rallyMeta?.windows?.length) return null;
    let result = null;
    for (const w of rallyMeta.windows) { if (w.hit_frame <= scrubFrame) result = w.hitter; }
    return result;
  }, [scrubFrame, rallyMeta]);

  const activeScrubShot = useMemo(() => {
    if (!scrubFrame || !rallyShots.length) return currentShot;
    let result = null;
    for (const s of rallyShots) { if (s.hit_frame <= scrubFrame) result = s; }
    return result || currentShot;
  }, [scrubFrame, rallyShots, currentShot]);

  if (loading) return (
    <div style={{padding:40,textAlign:'center',color:'#64748b',fontFamily:M}}>Connecting to server…</div>
  );
  if (!online) return (
    <div style={{padding:40}}>
      <div style={{padding:'12px 16px',background:'#7f1d1d22',border:'1px solid #ef444433',borderRadius:8}}>
        <div style={{fontSize:12,color:'#ef4444',fontFamily:M,fontWeight:600,marginBottom:4}}>⚠ Server not running</div>
        <div style={{fontSize:11,color:'#fca5a5',lineHeight:1.7}}>
          Start the local frame server:<br/>
          <code style={{fontFamily:M,color:'#f87171',background:'#450a0a',padding:'2px 8px',borderRadius:4}}>python badminton_server.py</code>
          &nbsp; then refresh.
        </div>
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 51px)',overflow:'hidden'}}>
    <div style={{display:'grid',gridTemplateColumns:'230px 1fr 290px',flex:'1 1 0',minHeight:0}}>

      {/* ── LEFT: Video Library ── */}
      <div style={{borderRight:'1px solid #1e293b',display:'flex',flexDirection:'column',overflow:'hidden',background:'#080d16'}}>
        <div style={{padding:'12px 14px',borderBottom:'1px solid #1e293b',flexShrink:0}}>
          <div style={{fontSize:12,fontWeight:600,color:'#e2e8f0',marginBottom:1}}>Video Library</div>
          <div style={{fontSize:9,color:'#475569',fontFamily:M}}>{Object.keys(rallyMap).length} rallies · {shots.length} shots</div>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {matches.map(match => {
            const isExp  = expandedMatch === match;
            const rallies = matchGroups[match];
            const totalShots = rallies.reduce((a,r)=>a+(rallyMap[r]?.length||0),0);
            return (
              <div key={match}>
                <div onClick={()=>setExpandedMatch(isExp?null:match)}
                  style={{padding:'9px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:8,
                    background:isExp?'#0f172a':'transparent',borderBottom:'1px solid #1e293b22',
                    userSelect:'none'}}>
                  <span style={{fontSize:9,color:isExp?'#94a3b8':'#334155'}}>{isExp?'▾':'▸'}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:600,color:isExp?'#e2e8f0':'#475569',fontFamily:M}}>Match {match}</div>
                    <div style={{fontSize:8,color:'#334155',fontFamily:M}}>{rallies.length} rallies · {totalShots} shots</div>
                  </div>
                </div>
                {isExp && rallies.map(rid => {
                  const rshots  = rallyMap[rid] || [];
                  const isSel   = rid === selRally;
                  const rnum    = rid.split('_').slice(1).join('_');
                  const rPreds  = fbPreds ? fbPreds.filter(p=>p.rally_id===rid) : [];
                  const rExact  = rPreds.filter(p=>semMatch(p.predicted,p.fb_label_en)==='exact').length;
                  const rSem    = rPreds.filter(p=>semMatch(p.predicted,p.fb_label_en)==='semantic').length;
                  const rN      = rPreds.length;
                  return (
                    <div key={rid}
                      onClick={()=>{ setSelRally(rid); setSelShotIdx(0); setScrubFrame(null); setRallyMeta(null); }}
                      style={{padding:'8px 14px 8px 28px',cursor:'pointer',
                        background:isSel?'#1e293b':'transparent',
                        borderLeft:`3px solid ${isSel?'#FF6B35':'transparent'}`,
                        borderBottom:'1px solid #1e293b22',
                        display:'flex',alignItems:'center',gap:8}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:isSel?'#f8fafc':'#94a3b8',fontFamily:M,fontWeight:isSel?600:400}}>
                          🎬 Rally {rnum}</div>
                        <div style={{fontSize:8,color:'#334155',fontFamily:M,marginTop:1}}>{rshots.length} shots</div>
                      </div>
                      {rN > 0 && (
                        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1,flexShrink:0}}>
                          <span style={{fontSize:8,fontFamily:M,fontWeight:700,
                            color:'#10b981'}}>{(rExact/rN*100).toFixed(0)}%</span>
                          <span style={{fontSize:7,fontFamily:M,color:'#f59e0b'}}>
                            ≈{((rExact+rSem)/rN*100).toFixed(0)}%</span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── CENTER: Frame Viewer ── */}
      <div style={{display:'flex',flexDirection:'column',overflow:'hidden',background:'#080d16'}}>
        {/* Top bar */}
        <div style={{padding:'8px 14px',borderBottom:'1px solid #1e293b',flexShrink:0,
          display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:9,color:'#334155',fontFamily:M}}>
            Model: <span style={{color:'#818cf8'}}>D4_mlp_bn</span>
            <span style={{color:'#1e293b'}}> · 15 cls · F1=0.652</span>
          </span>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:8,color:'#334155',fontFamily:M}}>Skeleton:</span>
            {['original','gdino'].map(mode => {
              const hasGdino = gdinoRallies.includes(selRally);
              const disabled = mode==='gdino' && !hasGdino;
              const active   = skelMode===mode;
              return (
                <button key={mode} onClick={()=>!disabled&&setSkelMode(mode)}
                  style={{padding:'3px 8px',borderRadius:4,fontSize:8,fontFamily:M,
                    cursor:disabled?'not-allowed':'pointer',border:'none',
                    background:active?'#3b82f6':'#1e293b',
                    color:active?'#fff':disabled?'#2d3748':'#64748b',
                    opacity:disabled?0.4:1}}>
                  {mode==='original'?'YOLOv8':'GDINO'}
                </button>
              );
            })}
          </div>
        </div>

        {currentShot ? (
          <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
            {/* Rally + shot info bar */}
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:12,fontWeight:600,color:'#e2e8f0',fontFamily:M}}>{selRally}</span>
              <span style={{fontSize:9,color:'#334155',fontFamily:M}}>
                shot {selShotIdx+1}/{rallyShots.length}
              </span>
              <span style={{fontSize:9,fontFamily:M,padding:'2px 7px',borderRadius:3,
                background:'#1e293b',color:'#64748b'}}>
                {activeScrubShot?.hitter||currentShot.hitter} hitter
              </span>
              <span style={{fontSize:9,fontFamily:M,padding:'2px 7px',borderRadius:3,
                background:'#1e293b',color:'#64748b'}}>
                f {scrubFrame || currentShot.hit_frame}
              </span>
              {/* Active prediction badge */}
              {(() => {
                const p = predByKey[`${currentShot.video}|${currentShot.hit_frame}`];
                if (!p) return null;
                const mk = semMatch(p.predicted, p.fb_label_en);
                const mc = mk==='exact'?'#10b981':mk==='semantic'?'#f59e0b':'#ef4444';
                const mi = mk==='exact'?'✓':mk==='semantic'?'≈':'✗';
                return (
                  <span style={{marginLeft:'auto',fontSize:9,fontFamily:M,fontWeight:600,
                    padding:'3px 8px',borderRadius:4,
                    color:mc,background:`${mc}18`,border:`1px solid ${mc}44`}}>
                    {mi} {p.predicted} · {(p.confidence*100).toFixed(0)}%
                  </span>
                );
              })()}
            </div>

            {/* Canvas */}
            <RealFrameCanvas shot={currentShot} width={600} height={338}
              frameNum={scrubFrame} rallyMeta={rallyMeta} skelMode={skelMode}
              hitterOverride={frameHitter}/>

            {/* Scrubber */}
            <RallyScrubber rallyMeta={rallyMeta} currentShot={currentShot}
              scrubFrame={scrubFrame} onScrub={fn=>setScrubFrame(fn)}
              onShotJump={s=>{
                const idx=rallyShots.findIndex(x=>x.id===s.id);
                if(idx>=0){setSelShotIdx(idx);setScrubFrame(null);}
              }}/>

            {/* Info chips */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[
                ['FB Label',   currentShot.hit_type,           '#94a3b8'],
                ['Player',     currentShot.hitter,             '#e2e8f0'],
                ['Hit Frame',  `#${currentShot.hit_frame}`,    '#475569'],
              ].map(([l,v,c])=>(
                <div key={l} style={{background:'#0f172a',border:'1px solid #1e293b',
                  borderRadius:6,padding:'7px 10px',textAlign:'center'}}>
                  <div style={{fontSize:7,color:'#334155',fontFamily:M,marginBottom:2}}>{l}</div>
                  <div style={{fontSize:11,fontWeight:600,fontFamily:M,color:c}}>{v||'—'}</div>
                </div>
              ))}
            </div>

            {/* Top-5 bar chart for current shot (only when preds loaded) */}
            {(() => {
              const p = predByKey[`${currentShot.video}|${currentShot.hit_frame}`];
              if (!p?.top5?.length) return null;
              const confColor = p.confidence>=0.75?'#10b981':p.confidence>=0.5?'#f59e0b':'#ef4444';
              return (
                <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:8,color:'#475569',fontFamily:M,letterSpacing:.6,marginBottom:8}}>TOP-5 CLASS PROBABILITIES</div>
                  <div style={{display:'flex',flexDirection:'column',gap:5}}>
                    {p.top5.map(([cls,prob],i)=>{
                      const isTop = i===0;
                      const col   = isTop ? confColor : '#334155';
                      return (
                        <div key={cls} style={{display:'flex',alignItems:'center',gap:8}}>
                          <div style={{width:110,fontSize:9,fontFamily:M,flexShrink:0,
                            color:isTop?'#e2e8f0':'#475569',
                            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cls}</div>
                          <div style={{flex:1,height:4,background:'#1e293b',borderRadius:2,overflow:'hidden'}}>
                            <div style={{width:`${prob*100}%`,height:'100%',background:col,
                              transition:'width 0.3s ease'}}/>
                          </div>
                          <span style={{fontSize:9,fontFamily:M,color:col,width:30,textAlign:'right',flexShrink:0}}>
                            {(prob*100).toFixed(0)}%</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        ) : (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
            flexDirection:'column',gap:12,color:'#1e293b',fontFamily:M}}>
            <div style={{fontSize:32}}>🎬</div>
            <div style={{fontSize:12}}>Select a rally from the library</div>
          </div>
        )}
      </div>

      {/* ── RIGHT: Predictions Panel ── */}
      <div style={{borderLeft:'1px solid #1e293b',display:'flex',flexDirection:'column',overflow:'hidden',background:'#080d16'}}>
        {/* Header */}
        <div style={{padding:'12px 14px',borderBottom:'1px solid #1e293b',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:600,color:'#e2e8f0'}}>Shot Predictions</div>
            {rallyScore !== null && (
              <div style={{marginLeft:'auto',display:'flex',gap:4,alignItems:'center'}}>
                <span title={`Top-${topK} exact match (this rally)`} style={{fontSize:9,fontFamily:M,fontWeight:700,
                  color:'#10b981',background:'#10b98118',padding:'2px 6px',borderRadius:4}}>
                  ✓ {(rallyScore.exactPct*100).toFixed(0)}%</span>
                <span title={`Top-${topK} semantic match (same shot family)`} style={{fontSize:9,fontFamily:M,fontWeight:700,
                  color:'#f59e0b',background:'#f59e0b18',padding:'2px 6px',borderRadius:4}}>
                  ≈ {(rallyScore.semPct*100).toFixed(0)}%</span>
              </div>
            )}
          </div>
          {/* Top-K toggle */}
          {fbPreds !== null && (
            <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:8}}>
              <span style={{fontSize:8,color:'#475569',fontFamily:M,fontWeight:600}}>Top-K:</span>
              {[1,2,3,5].map(k => (
                <button key={k} onClick={()=>setTopK(k)}
                  style={{
                    padding:'2px 7px',fontSize:9,fontFamily:M,fontWeight:700,
                    background: topK===k ? '#6366f122' : 'transparent',
                    color:      topK===k ? '#a5b4fc' : '#475569',
                    border:`1px solid ${topK===k ? '#6366f1' : '#1e293b'}`,
                    borderRadius:3,cursor:'pointer',transition:'all 0.15s',
                  }}>
                  {k}
                </button>
              ))}
              {overallScore && (
                <span style={{marginLeft:'auto',fontSize:8,color:'#64748b',fontFamily:M}}>
                  all: <span style={{color:'#10b981',fontWeight:700}}>{(overallScore.exactPct*100).toFixed(1)}%</span>
                  {' / '}
                  <span style={{color:'#f59e0b',fontWeight:700}}>{(overallScore.semPct*100).toFixed(1)}%</span>
                </span>
              )}
            </div>
          )}
          <button onClick={loadInference} disabled={inferLoading}
            style={{width:'100%',padding:'7px 0',borderRadius:6,fontSize:10,fontFamily:M,
              cursor:inferLoading?'wait':'pointer',
              border:`1px solid ${fbPreds===null?'#6366f1':'#334155'}`,
              background:fbPreds===null?'#6366f122':'transparent',
              color:inferLoading?'#334155':fbPreds===null?'#a5b4fc':'#475569',
              transition:'all 0.15s'}}>
            {inferLoading ? '⏳ Running inference…' : fbPreds===null ? '▶  Run Model on All Shots' : '↻  Re-run'}
          </button>
          {fbPreds !== null && (
            <div style={{fontSize:8,color:'#334155',fontFamily:M,marginTop:4,textAlign:'center'}}>
              {fbPreds.length} shots predicted across all rallies
            </div>
          )}
        </div>

        {/* Shot-by-shot list */}
        <div style={{flex:1,overflowY:'auto'}}>
          {fbPreds === null ? (
            <div style={{padding:32,textAlign:'center',color:'#1e293b',fontFamily:M,lineHeight:2}}>
              <div style={{fontSize:28,marginBottom:8}}>🔮</div>
              <div style={{fontSize:11,color:'#334155'}}>Run the model to compare<br/>predictions vs. FB labels</div>
            </div>
          ) : rallyPreds.length === 0 ? (
            <div style={{padding:24,textAlign:'center',color:'#334155',fontSize:10,fontFamily:M,lineHeight:1.8}}>
              No predictions for this rally<br/>
              <span style={{color:'#1e293b'}}>(skeleton not extracted)</span>
            </div>
          ) : rallyPreds.map((pred, i) => {
            const shot    = rallyShots.find(s => s.hit_frame === pred.hit_frame);
            const isSel   = shot && shot.id === currentShot?.id;
            const conf    = pred.confidence;
            const cColor  = conf>=0.75?'#10b981':conf>=0.5?'#f59e0b':'#ef4444';
            const mKind   = semMatch(pred.predicted, pred.fb_label_en);
            const mColor  = mKind==='exact'?'#10b981':mKind==='semantic'?'#f59e0b':'#ef4444';
            const mIcon   = mKind==='exact'?'✓':mKind==='semantic'?'≈':'✗';
            return (
              <div key={`${pred.rally_id}|${pred.hit_frame}`}
                onClick={()=>{
                  if(shot){ const idx=rallyShots.findIndex(s=>s.id===shot.id); if(idx>=0){setSelShotIdx(idx);setScrubFrame(null);} }
                }}
                style={{padding:'10px 14px',cursor:'pointer',
                  background:isSel?'#1e293b':'transparent',
                  borderLeft:`3px solid ${isSel?mColor:'transparent'}`,
                  borderBottom:'1px solid #0f172a'}}>
                {/* Row header */}
                <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
                  <span style={{fontSize:8,fontFamily:M,color:'#334155',width:18,flexShrink:0}}>#{i+1}</span>
                  <span style={{fontSize:8,fontFamily:M,color:'#334155'}}>f{pred.hit_frame}</span>
                  <span style={{fontSize:8,fontFamily:M,color:'#334155',
                    background:'#0f172a',padding:'1px 5px',borderRadius:2}}>{pred.hitter}</span>
                  <span style={{marginLeft:'auto',fontSize:13,fontWeight:700,color:mColor}}>
                    {mIcon}
                  </span>
                </div>
                {/* Label comparison */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 16px 1fr',gap:4,alignItems:'center',marginBottom:6}}>
                  <div style={{background:'#0f172a',borderRadius:4,padding:'5px 7px'}}>
                    <div style={{fontSize:7,color:'#334155',fontFamily:M,marginBottom:1}}>FB LABEL</div>
                    <div style={{fontSize:10,color:'#64748b',fontFamily:M,fontWeight:500,lineHeight:1.2}}>{pred.fb_label}</div>
                  </div>
                  <div style={{textAlign:'center',color:'#334155',fontSize:10}}>→</div>
                  <div style={{background:'#0f172a',borderRadius:4,padding:'5px 7px',
                    border:`1px solid ${cColor}33`}}>
                    <div style={{fontSize:7,color:'#334155',fontFamily:M,marginBottom:1}}>PREDICTED</div>
                    <div style={{fontSize:10,color:cColor,fontFamily:M,fontWeight:700,lineHeight:1.2}}>{pred.predicted}</div>
                    <div style={{fontSize:7,color:cColor,fontFamily:M}}>{(conf*100).toFixed(0)}%</div>
                  </div>
                </div>
                {/* Confidence bar */}
                <div style={{height:2,background:'#0f172a',borderRadius:1,overflow:'hidden'}}>
                  <div style={{width:`${conf*100}%`,height:'100%',background:cColor,transition:'width 0.3s ease'}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>

    {/* ── TAXONOMY ── */}
    <div style={{flexShrink:0,borderTop:'1px solid #1e293b',background:'#080d16',
      overflowX:'auto',overflowY:'hidden'}}>
      <ShotTaxonomy/>
    </div>
    </div>
  );
}

// ─── Shot taxonomy component ───────────────────────────────────────────────────
const FB_SHOTS = [
  { fb:'serve',                model:'short service',          ss:'short service',          color:'#6366f1' },
  { fb:'kill',                 model:'smash',                  ss:'smash',                  color:'#ef4444' },
  { fb:'clear',                model:'clear',                  ss:'clear',                  color:'#3b82f6' },
  { fb:'drive',                model:'drive',                  ss:'drive (4 merged)',       color:'#f59e0b' },
  { fb:'drop shot',            model:'drop',                   ss:'drop',                   color:'#10b981' },
  { fb:'net shot',             model:'net shot',               ss:'net shot',               color:'#06b6d4' },
  { fb:'block',                model:'return net',             ss:'return net',             color:'#84cc16' },
  { fb:'push shot',            model:'push',                   ss:'push',                   color:'#f97316' },
  { fb:'net lift',             model:'lob',                    ss:'lob',                    color:'#a78bfa' },
  { fb:'net kill',             model:'rush',                   ss:'rush',                   color:'#fb7185' },
  { fb:'cross-court net shot', model:'cross-court net shot',   ss:'cross-court net shot',   color:'#38bdf8' },
];
const SS_ONLY = [
  { ss:'long service',         model:'long service',           note:'FB uses one "serve" type' },
  { ss:'wrist smash',          model:'wrist smash',            note:'quick wrist-only smash' },
  { ss:'defensive return lob', model:'defensive return lob',   note:'reactive lob under pressure' },
  { ss:'passive drop',         model:'passive drop',           note:'weak / transitional drop' },
];

function ShotTaxonomy() {
  return (
    <div style={{display:'flex',gap:0,alignItems:'stretch',minWidth:900,height:162}}>

      {/* ── FB column ── */}
      <div style={{width:220,flexShrink:0,borderRight:'1px solid #1e293b',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'6px 12px',borderBottom:'1px solid #1e293b',flexShrink:0,
          display:'flex',alignItems:'baseline',gap:6}}>
          <span style={{fontSize:10,fontWeight:700,color:'#e2e8f0'}}>FineBadminton</span>
          <span style={{fontSize:8,color:'#334155',fontFamily:M}}>11 shot types</span>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'4px 0'}}>
          {FB_SHOTS.map(r => (
            <div key={r.fb} style={{display:'flex',alignItems:'center',gap:6,padding:'2px 12px',height:12}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:r.color,flexShrink:0}}/>
              <span style={{fontSize:9,fontFamily:M,color:'#94a3b8',whiteSpace:'nowrap'}}>{r.fb}</span>
            </div>
          ))}
          <div style={{margin:'4px 0',borderTop:'1px dashed #1e293b',display:'flex',alignItems:'center',padding:'0 12px',height:14}}>
            <span style={{fontSize:7,fontFamily:M,color:'#334155',letterSpacing:.5}}>not in FB</span>
          </div>
          {SS_ONLY.map(r => (
            <div key={r.model} style={{height:12}}/>
          ))}
        </div>
      </div>

      {/* ── Run6 model column ── */}
      <div style={{width:200,flexShrink:0,borderRight:'1px solid #1e293b',display:'flex',flexDirection:'column',
        background:'#0a0f1a'}}>
        <div style={{padding:'6px 12px',borderBottom:'1px solid #1e293b',flexShrink:0,
          display:'flex',alignItems:'baseline',gap:6}}>
          <span style={{fontSize:10,fontWeight:700,color:'#818cf8'}}>Run6 Model</span>
          <span style={{fontSize:8,color:'#334155',fontFamily:M}}>15 classes</span>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'4px 0'}}>
          {FB_SHOTS.map(r => (
            <div key={r.model} style={{display:'flex',alignItems:'center',gap:6,padding:'2px 12px',height:12}}>
              <span style={{fontSize:9,fontFamily:M,color:'#818cf8',whiteSpace:'nowrap'}}>{r.model}</span>
            </div>
          ))}
          <div style={{margin:'4px 0',borderTop:'1px dashed #1e293b',display:'flex',alignItems:'center',padding:'0 12px',height:14}}>
            <span style={{fontSize:7,fontFamily:M,color:'#334155',letterSpacing:.5}}>SS ONLY ↓</span>
          </div>
          {SS_ONLY.map(r => (
            <div key={r.model} style={{display:'flex',alignItems:'center',gap:6,padding:'2px 12px',height:12}}>
              <span style={{fontSize:9,fontFamily:M,color:'#334155',whiteSpace:'nowrap'}}>{r.model}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ── ShuttleSet column ── */}
      <div style={{width:240,flexShrink:0,borderRight:'1px solid #1e293b',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'6px 12px',borderBottom:'1px solid #1e293b',flexShrink:0,
          display:'flex',alignItems:'baseline',gap:6}}>
          <span style={{fontSize:10,fontWeight:700,color:'#e2e8f0'}}>ShuttleSet</span>
          <span style={{fontSize:8,color:'#334155',fontFamily:M}}>17 types → 15 model classes</span>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'4px 0'}}>
          {FB_SHOTS.map(r => (
            <div key={r.ss} style={{display:'flex',alignItems:'center',gap:6,padding:'2px 12px',height:12}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:r.color,flexShrink:0}}/>
              <span style={{fontSize:9,fontFamily:M,color:'#94a3b8',whiteSpace:'nowrap'}}>{r.ss}</span>
            </div>
          ))}
          <div style={{margin:'4px 0',borderTop:'1px dashed #1e293b',display:'flex',alignItems:'center',padding:'0 12px',height:14}}>
            <span style={{fontSize:7,fontFamily:M,color:'#334155',letterSpacing:.5}}>no FB equivalent</span>
          </div>
          {SS_ONLY.map(r => (
            <div key={r.ss} style={{display:'flex',alignItems:'center',gap:6,padding:'2px 12px',height:12,opacity:.5}}>
              <span style={{fontSize:9,fontFamily:M,color:'#475569',whiteSpace:'nowrap'}}>{r.ss}</span>
              <span style={{fontSize:7,fontFamily:M,color:'#334155',whiteSpace:'nowrap'}}>— {r.note}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ── Legend / notes ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',padding:'6px 14px',minWidth:200}}>
        <div style={{fontSize:10,fontWeight:700,color:'#e2e8f0',marginBottom:6}}>Notes</div>
        <div style={{display:'flex',flexDirection:'column',gap:4,fontSize:8,fontFamily:M,color:'#475569',lineHeight:1.5}}>
          <div><span style={{color:'#94a3b8'}}>Shared (11):</span> FB and SS overlap on all major shot types. Colour-coded rows above align them.</div>
          <div><span style={{color:'#94a3b8'}}>SS-only (4):</span> long service, wrist smash, defensive return lob, passive drop — absent from FB annotations.</div>
          <div><span style={{color:'#94a3b8'}}>passive drop:</span> run6 class for 過渡切球 (weak/transitional drop). FB has no exact match — model may over-predict on uncertain FB shots.</div>
          <div><span style={{color:'#94a3b8'}}>drive (SS):</span> 平球 + 後場抽平球 + 防守回抽 + 小平球 merged into one class (all individually too rare to learn).</div>
        </div>
      </div>

    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const TABS = [
  { id:'fb',       label:'FineBadminton',  icon:'🏸', tag:'inference' },
  { id:'ss',       label:'ShuttleSet',     icon:'📊', tag:'training' },
  { id:'analysis', label:'Match Analysis', icon:'🗺' },
];

function App() {
  const [tab, setTab] = useState('ss');
  return (
    <div style={{minHeight:'100vh',background:'#0a0f1a',color:'#e2e8f0',
      fontFamily:"'DM Sans','Helvetica Neue',sans-serif"}}>
      {/* Header */}
      <div style={{borderBottom:'1px solid #1e293b',padding:'10px 20px',
        display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:6,
            background:'linear-gradient(135deg,#FF6B35,#A855F7)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>🏸</div>
          <div>
            <div style={{fontSize:14,fontWeight:600,letterSpacing:'-.02em'}}>Badminton Pipeline Demo</div>
          </div>
        </div>
        <div style={{display:'flex',gap:2}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?'#1e293b':'transparent',
                border:`1px solid ${tab===t.id?'#FF6B35':'transparent'}`,
                color:tab===t.id?'#f8fafc':'#64748b',padding:'6px 12px',
                borderRadius:6,fontSize:11,cursor:'pointer',
                display:'flex',alignItems:'center',gap:5}}>
              <span style={{fontSize:12}}>{t.icon}</span>{t.label}
              {t.tag && (
                <span style={{fontSize:8,fontFamily:M,fontWeight:600,letterSpacing:.3,
                  padding:'1px 5px',borderRadius:3,textTransform:'uppercase',
                  background:t.tag==='inference'?'#6366f122':'#10b98122',
                  color:t.tag==='inference'?'#a5b4fc':'#34d399'}}>
                  {t.tag}
                </span>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Tab content */}
      {tab==='fb'       && <FBTab/>}
      {tab==='ss'       && <div style={{padding:20}}><SSBrowser/></div>}
      {tab==='analysis' && <MatchAnalysisTab/>}
    </div>
  );
}

function MatchAnalysisTab() {
  const [ssMatches, setSSMatches] = useState(null);
  const [ssOnline,  setSSOnline]  = useState(false);

  useEffect(() => {
    fetch(`${SERVER}/api/ss/matches`, { signal: AbortSignal.timeout(5000) })
      .then(r => r.json())
      .then(data => { setSSMatches(data); setSSOnline(true); })
      .catch(() => { setSSMatches([]); setSSOnline(false); });
  }, []);

  const noSkelMatches = useMemo(() =>
    (ssMatches || []).filter(m => !m.has_gdino), [ssMatches]);

  return (
    <div style={{padding:20}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:16,alignItems:'start'}}>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <CourtCanvas width={700} height={500}/>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{background:'#0f172a',borderRadius:8,border:'1px solid #1e293b',overflow:'hidden'}}>
            <div style={{padding:'8px 10px',borderBottom:'1px solid #1e293b',fontSize:8,
              color:'#64748b',fontFamily:M,letterSpacing:.8}}>PIPELINE STAGES</div>
            <div style={{padding:'6px 10px'}}>
              {['ffmpeg 30fps','Court detect (RANSAC)','TrackNetV3 shuttle','Hit detect (>90°)',
                'YOLOv8-Pose','T=16 segment','Feature eng. L2','ST-GCN 256-d','ProtoNet 5-way'].map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',
                  borderBottom:'1px solid #1e293b22'}}>
                  <div style={{width:14,height:14,borderRadius:'50%',background:'#10b981',fontSize:7,
                    color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✓</div>
                  <span style={{fontSize:9,fontFamily:M,color:'#94a3b8'}}>{s}</span>
                </div>
              ))}
            </div>
          </div>

          {/* SS matches without GDINO skeletons */}
          <div style={{background:'#0f172a',borderRadius:8,border:'1px solid #1e293b',overflow:'hidden'}}>
            <div style={{padding:'8px 10px',borderBottom:'1px solid #1e293b',
              display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:8,color:'#64748b',fontFamily:M,letterSpacing:.8}}>
                SS MATCHES (NO SKELETON)</span>
              <span style={{fontSize:8,color:'#f59e0b',fontFamily:M}}>
                {ssMatches === null ? '…' : `${noSkelMatches.length} awaiting extraction`}</span>
            </div>
            {!ssOnline ? (
              <div style={{padding:10,fontSize:10,color:'#ef4444',fontFamily:M}}>Server offline</div>
            ) : ssMatches === null ? (
              <div style={{padding:10,fontSize:10,color:'#64748b',fontFamily:M}}>Loading…</div>
            ) : (
              <div style={{overflowY:'auto',maxHeight:400}}>
                {noSkelMatches.map(entry => {
                  const {match:m, winner, loser, rally_count, shot_count, split} = entry;
                  const label = winner && loser ? `${winner} vs ${loser}` : ssMatchLabel(m);
                  const sc = split === 'train' ? '#22c55e' : split === 'test' ? '#f59e0b' : split === 'held_out' ? '#a78bfa' : '#64748b';
                  const sl = split === 'train' ? 'Train' : split === 'test' ? 'Test' : split === 'held_out' ? 'Held-out' : 'Unused';
                  return (
                    <div key={m} style={{padding:'6px 10px',borderBottom:'1px solid #1e293b22',
                      display:'flex',flexDirection:'column',gap:2}}>
                      <div style={{display:'flex',alignItems:'center',gap:4}}>
                        <span style={{fontSize:7,fontFamily:M,color:sc,fontWeight:700,
                          background:sc+'18',borderRadius:3,padding:'1px 4px',flexShrink:0,
                          border:`1px solid ${sc}44`}}>{sl}</span>
                        <span style={{fontSize:9,fontFamily:M,color:'#94a3b8',
                          whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',flex:1}}
                          title={m}>{label}</span>
                      </div>
                      <span style={{fontSize:8,color:'#475569',fontFamily:M}}>
                        {rally_count} rall{rally_count===1?'y':'ies'} · {shot_count} shots</span>
                    </div>
                  );
                })}
                {noSkelMatches.length === 0 && (
                  <div style={{padding:12,fontSize:10,color:'#475569',fontFamily:M,textAlign:'center'}}>
                    All matches have skeletons extracted</div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
