<svg width="100%" viewBox="0 0 1080 300" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Temporal window strategies</title>
<desc>Two panels comparing a fixed symmetric window of ±16 frames around the hit against a variable hit-to-hit window spanning the previous, current, and next hit, resampled to T = 32 frames.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrs" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- player stick-figure templates; recoloured with `color` attribute on <use> -->
  <g id="player-prep">
    <circle cx="0" cy="0" r="6" fill="currentColor"/>
    <line x1="0" y1="6" x2="0" y2="28" stroke="currentColor" stroke-width="2"/>
    <line x1="0" y1="14" x2="-8" y2="22" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="14" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="-6" y2="42" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="6" y2="42" stroke="currentColor" stroke-width="1.5"/>
    <line x1="10" y1="6" x2="14" y2="-4" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="14" cy="-7" rx="4" ry="3" fill="none" stroke="currentColor" stroke-width="0.8"/>
  </g>
  <g id="player-hit">
    <circle cx="0" cy="0" r="6" fill="currentColor"/>
    <line x1="0" y1="6" x2="0" y2="28" stroke="currentColor" stroke-width="2"/>
    <line x1="0" y1="14" x2="-9" y2="24" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="14" x2="6" y2="-2" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="-8" y2="42" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="8" y2="42" stroke="currentColor" stroke-width="1.5"/>
    <line x1="6" y1="-2" x2="10" y2="-12" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="10" cy="-15" rx="4" ry="3" fill="none" stroke="currentColor" stroke-width="0.8"/>
  </g>
  <g id="player-follow">
    <circle cx="0" cy="0" r="6" fill="currentColor"/>
    <line x1="0" y1="6" x2="0" y2="28" stroke="currentColor" stroke-width="2"/>
    <line x1="0" y1="14" x2="-10" y2="6" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="14" x2="9" y2="22" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="-6" y2="42" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="6" y2="42" stroke="currentColor" stroke-width="1.5"/>
    <line x1="-10" y1="6" x2="-14" y2="-2" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="-14" cy="-5" rx="4" ry="3" fill="none" stroke="currentColor" stroke-width="0.8"/>
  </g>
</defs>

<!-- ===== Panel (a) Fixed window ===== -->
<text x="280" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(a) Fixed window — symmetric ±16 frames around hit</text>

<!-- player figures: prep / contact / follow-through -->
<g color="#534AB7"><use href="#player-prep" transform="translate(100,70)"/></g>
<text x="100" y="130" text-anchor="middle" font-size="10" fill="#534AB7">prep</text>

<g color="#993C1D"><use href="#player-hit" transform="translate(280,65)"/></g>
<text x="280" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#993C1D">contact</text>

<g color="#534AB7"><use href="#player-follow" transform="translate(460,70)"/></g>
<text x="460" y="130" text-anchor="middle" font-size="10" fill="#534AB7">follow-through</text>

<!-- T = 32 brace above timeline -->
<path d="M100 165 Q100 158 107 158 L266 158 Q273 158 273 151 Q273 158 280 158 L453 158 Q460 158 460 165"
      fill="none" stroke="#9DB0A4" stroke-width="0.9"/>
<rect x="244" y="146" width="72" height="14" fill="#FFFFFF"/>
<text x="280" y="156" text-anchor="middle" font-size="10.5" fill="#6B6B66">T = 32 frames</text>

<!-- timeline bar -->
<rect x="100" y="175" width="360" height="8" rx="2" fill="#444441"/>
<line x1="100" y1="170" x2="100" y2="190" stroke="#444441" stroke-width="1.5"/>
<line x1="280" y1="170" x2="280" y2="190" stroke="#444441" stroke-width="1.5"/>
<line x1="460" y1="170" x2="460" y2="190" stroke="#444441" stroke-width="1.5"/>

<!-- frame labels -->
<text x="100" y="206" text-anchor="middle" font-size="10.5" fill="#6B6B66">h − 16</text>
<text x="280" y="206" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1A1A2E">h (hit)</text>
<text x="460" y="206" text-anchor="middle" font-size="10.5" fill="#6B6B66">h + 16</text>

<!-- hit frame arrow -->
<line x1="280" y1="240" x2="280" y2="220" stroke="#993C1D" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="280" y="254" text-anchor="middle" font-size="10.5" fill="#993C1D">hit frame</text>

<!-- caption -->
<text x="280" y="278" text-anchor="middle" font-size="9.5" fill="#8A8A84">symmetric crop, fixed length — phase-aligned across shots</text>

<!-- ===== vertical divider ===== -->
<line x1="540" y1="30" x2="540" y2="278" stroke="#C9C8C2" stroke-width="1" stroke-dasharray="5 5"/>

<!-- ===== Panel (b) Variable window ===== -->
<text x="800" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(b) Variable window — previous hit → next hit, resampled to T = 32</text>

<!-- incoming / outgoing shot labels -->
<text x="700" y="40" text-anchor="middle" font-size="9.5" font-style="italic" fill="#BA7517">incoming shot</text>
<text x="900" y="40" text-anchor="middle" font-size="9.5" font-style="italic" fill="#BA7517">outgoing shot</text>

<!-- shuttle arcs (dashed orange) -->
<path d="M620 78 Q700 42 800 70" fill="none" stroke="#EF9F27" stroke-width="1.4" stroke-dasharray="4 3"/>
<path d="M800 70 Q900 42 980 78" fill="none" stroke="#EF9F27" stroke-width="1.4" stroke-dasharray="4 3"/>

<!-- player figures: opponent hits / our hit / opponent returns -->
<g color="#993C1D"><use href="#player-hit" transform="translate(620,75)"/></g>
<text x="620" y="130" text-anchor="middle" font-size="10" fill="#993C1D">opponent hits</text>

<g color="#2D8F8A"><use href="#player-hit" transform="translate(800,70)"/></g>
<text x="800" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#2D8F8A">our hit</text>

<g color="#993C1D"><use href="#player-follow" transform="translate(980,75)"/></g>
<text x="980" y="130" text-anchor="middle" font-size="10" fill="#993C1D">opp. returns</text>

<!-- full duration brace -->
<path d="M620 165 Q620 158 627 158 L786 158 Q793 158 793 151 Q793 158 800 158 L973 158 Q980 158 980 165"
      fill="none" stroke="#9DB0A4" stroke-width="0.9"/>
<rect x="630" y="146" width="340" height="14" fill="#FFFFFF"/>
<text x="800" y="156" text-anchor="middle" font-size="10.5" fill="#6B6B66">full shot duration → resampled to T = 32</text>

<!-- timeline bar (variable length) -->
<rect x="620" y="175" width="360" height="8" rx="2" fill="#444441"/>
<line x1="620" y1="170" x2="620" y2="190" stroke="#444441" stroke-width="1.5"/>
<line x1="800" y1="170" x2="800" y2="190" stroke="#444441" stroke-width="1.5"/>
<line x1="980" y1="170" x2="980" y2="190" stroke="#444441" stroke-width="1.5"/>

<!-- frame labels -->
<text x="620" y="206" text-anchor="middle" font-size="10.5" fill="#6B6B66">h(prev)</text>
<text x="800" y="206" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1A1A2E">h (hit)</text>
<text x="980" y="206" text-anchor="middle" font-size="10.5" fill="#6B6B66">h(next)</text>

<!-- hit frame arrow -->
<line x1="800" y1="240" x2="800" y2="220" stroke="#2D8F8A" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="800" y="254" text-anchor="middle" font-size="10.5" fill="#2D8F8A">hit frame</text>

<!-- caption -->
<text x="800" y="278" text-anchor="middle" font-size="9.5" fill="#8A8A84">rally-relative crop, variable length — preserves shot-cycle context</text>

</svg>
