<svg width="100%" viewBox="0 0 1080 500" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Skeleton representation variants</title>
<desc>Five skeleton input representations: single player at feature layers L2 and L3, dual player, dual with a hitter-identity channel, and bone vectors.</desc>

<defs>
  <marker id="arrs" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <g id="skel">
    <path d="M0 0L0 21 M0 21L-23 25 M0 21L23 25 M-23 25L-35 53 M-35 53L-39 78
             M23 25L35 41 M35 41L51 16 M0 21L2 74 M2 74L-16 76 M2 74L18 76
             M-16 76L-21 110 M-21 110L-25 145 M18 76L21 113 M21 113L23 147"
          fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="51" y1="16" x2="61" y2="6" stroke="currentColor" stroke-width="2.8"/>
    <ellipse cx="67" cy="0" rx="10.5" ry="7.5" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <g fill="currentColor" stroke="#FFFFFF" stroke-width="1.4">
      <circle cx="0" cy="0" r="8"/><circle cx="0" cy="21" r="5"/>
      <circle cx="-23" cy="25" r="5"/><circle cx="23" cy="25" r="5"/>
      <circle cx="-35" cy="53" r="5"/><circle cx="35" cy="41" r="5"/>
      <circle cx="-39" cy="78" r="5"/><circle cx="51" cy="16" r="5"/>
      <circle cx="2" cy="74" r="5"/>
      <circle cx="-16" cy="76" r="5"/><circle cx="18" cy="76" r="5"/>
      <circle cx="-21" cy="110" r="5"/><circle cx="21" cy="113" r="5"/>
      <circle cx="-25" cy="145" r="5"/><circle cx="23" cy="147" r="5"/>
    </g>
  </g>
</defs>

<!-- Row 1 -->
<text x="180" y="22" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">(a) Single · L2 — 17 nodes · 10 d/node</text>
<use href="#skel" transform="translate(160,50) scale(1.1)" color="#534AB7"/>
<line x1="290" y1="80" x2="232" y2="80" stroke="#534AB7" stroke-width="1.4" marker-end="url(#arrs)"/>
<text x="293" y="84" font-size="11.5" font-weight="600" fill="#534AB7">(x, y)</text>

<text x="540" y="22" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">(b) Single · L3 — + joint angles · 14 d/node</text>
<use href="#skel" transform="translate(520,50) scale(1.1)" color="#534AB7"/>
<g stroke="#EF9F27" stroke-width="2">
  <line x1="576" y1="67" x2="596" y2="55" marker-end="url(#arrs)"/>
  <line x1="477" y1="123" x2="461" y2="136" marker-end="url(#arrs)"/>
  <line x1="543" y1="161" x2="557" y2="176" marker-end="url(#arrs)"/>
</g>
<line x1="643" y1="153" x2="621" y2="143" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrs)"/>
<text x="647" y="157" font-size="11" fill="#BA7517">velocity</text>
<line x1="646" y1="53" x2="592" y2="53" stroke="#534AB7" stroke-width="1.4" marker-end="url(#arrs)"/>
<text x="650" y="57" font-size="11.5" font-weight="600" fill="#534AB7">+ angles</text>

<text x="900" y="22" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">(c) Dual · L2 — both players · 34 nodes</text>
<text x="888" y="34" text-anchor="middle" font-size="10.5" font-weight="600" fill="#993C1D">Opponent</text>
<use href="#skel" transform="translate(888,44) scale(0.5)" color="#993C1D"/>
<line x1="758" y1="132" x2="1050" y2="132" stroke="#9DB0A4" stroke-width="1.1" stroke-dasharray="5 4"/>
<text x="1046" y="128" text-anchor="end" font-size="9.5" font-style="italic" fill="#8A9990">Y-sort (top / bottom)</text>
<use href="#skel" transform="translate(888,148) scale(0.5)" color="#534AB7"/>
<text x="888" y="240" text-anchor="middle" font-size="10.5" font-weight="600" fill="#534AB7">Hitter</text>

<!-- divider -->
<line x1="40" y1="258" x2="1040" y2="258" stroke="#C9C8C2" stroke-width="1" stroke-dasharray="5 5"/>

<!-- Row 2 — centered (d) and (e) -->
<text x="360" y="280" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">(d) Dual · L2 + hitter-ID channel</text>
<use href="#skel" transform="translate(348,300) scale(0.5)" color="#993C1D"/>
<text x="406" y="314" font-size="10.5" font-weight="600" fill="#993C1D">h = 0</text>
<line x1="216" y1="390" x2="508" y2="390" stroke="#9DB0A4" stroke-width="1.1" stroke-dasharray="5 4"/>
<rect x="324" y="406" width="50" height="90" rx="3" fill="#EAC75A" opacity="0.25"/>
<use href="#skel" transform="translate(348,408) scale(0.5)" color="#534AB7"/>
<circle cx="348" cy="408" r="6" fill="none" stroke="#D9A521" stroke-width="1.6"/>
<text x="406" y="422" font-size="10.5" font-weight="600" fill="#534AB7">h = 1</text>

<text x="720" y="280" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">(e) Bone vectors — child − parent · 2 d/node</text>
<use href="#skel" transform="translate(700,310) scale(1.1)" color="#CFCEC8"/>
<g stroke="#EF9F27" stroke-width="2.4">
  <line x1="700" y1="333.1" x2="723.4" y2="337.5" marker-end="url(#arrs)"/>
  <line x1="725.3" y1="337.5" x2="736.8" y2="354.2" marker-end="url(#arrs)"/>
  <line x1="738.5" y1="355.1" x2="754.4" y2="328.9" marker-end="url(#arrs)"/>
  <line x1="700" y1="333.1" x2="676.6" y2="337.5" marker-end="url(#arrs)"/>
  <line x1="674.7" y1="337.5" x2="663.2" y2="366.6" marker-end="url(#arrs)"/>
  <line x1="661.5" y1="368.3" x2="658.3" y2="394.1" marker-end="url(#arrs)"/>
  <line x1="700" y1="333.1" x2="702.0" y2="389.5" marker-end="url(#arrs)"/>
  <line x1="702.2" y1="391.4" x2="720.9" y2="432.1" marker-end="url(#arrs)"/>
  <line x1="723.1" y1="434.3" x2="725.1" y2="469.5" marker-end="url(#arrs)"/>
  <line x1="702.2" y1="391.4" x2="678.9" y2="428.9" marker-end="url(#arrs)"/>
  <line x1="676.9" y1="431.0" x2="672.7" y2="467.3" marker-end="url(#arrs)"/>
</g>

</svg>
