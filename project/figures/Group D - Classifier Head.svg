<svg width="100%" viewBox="0 0 1080 380" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Group D — Classifier Head</title>
<desc>Four classifier-head architectures shown as layer stacks joined by fan-out shapes: a linear head, a one-hidden-layer MLP, a two-hidden-layer MLP that funnels narrow, and a wide hidden layer with batch norm and dropout that keeps full width.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="540" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">Group D — Classifier Head</text>
<text x="540" y="50" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6B6B66">Mapping the 256-d shot embedding to 15 logits — fan shape shows where capacity is compressed</text>

<!-- (a) D1 Linear -->
<rect x="30" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="44" y="55" width="92" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="56" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(a) D1 · Linear</text>
<text x="148.5" y="100" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<polygon points="73.5,126 223.5,126 165.5,150 131.5,150" fill="#E4EBE7"/>
<rect x="73.5" y="108" width="150" height="18" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="148.5" y="121" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">256</text>
<rect x="131.5" y="150" width="34" height="18" rx="4" fill="#534AB7"/>
<text x="148.5" y="163" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFFFFF">15</text>
<text x="148.5" y="184" text-anchor="middle" font-size="9" fill="#8A8A84">15 shot-class logits</text>
<text x="148.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">256 → 15 · no hidden layer</text>
<text x="148.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B66">scores 15 class prototypes directly</text>

<!-- (b) D2 MLP-1 -->
<rect x="291" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="305" y="55" width="96" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="317" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(b) D2 · MLP-1</text>
<text x="409.5" y="100" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<polygon points="334.5,126 484.5,126 453.5,146 365.5,146" fill="#E4EBE7"/>
<polygon points="365.5,164 453.5,164 426.5,184 392.5,184" fill="#E4EBE7"/>
<rect x="334.5" y="108" width="150" height="18" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="409.5" y="121" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">256</text>
<rect x="365.5" y="146" width="88" height="18" rx="4" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="409.5" y="159" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">128</text>
<rect x="392.5" y="184" width="34" height="18" rx="4" fill="#534AB7"/>
<text x="409.5" y="197" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFFFFF">15</text>
<text x="409.5" y="218" text-anchor="middle" font-size="9" fill="#8A8A84">15 shot-class logits</text>
<text x="409.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">256 → 128 → 15</text>
<text x="409.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B66">one mild compression step</text>

<!-- (c) D3 MLP-2 -->
<rect x="552" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="566" y="55" width="96" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="578" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(c) D3 · MLP-2</text>
<text x="670.5" y="100" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<polygon points="595.5,122 745.5,122 714.5,140 626.5,140" fill="#E4EBE7"/>
<polygon points="626.5,158 714.5,158 696.5,176 644.5,176" fill="#E4EBE7"/>
<polygon points="644.5,194 696.5,194 687.5,212 653.5,212" fill="#E4EBE7"/>
<rect x="595.5" y="104" width="150" height="18" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="670.5" y="117" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">256</text>
<rect x="626.5" y="140" width="88" height="18" rx="4" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="670.5" y="153" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">128</text>
<rect x="644.5" y="176" width="52" height="18" rx="4" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="670.5" y="189" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">64</text>
<rect x="653.5" y="212" width="34" height="18" rx="4" fill="#534AB7"/>
<text x="670.5" y="225" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFFFFF">15</text>
<text x="670.5" y="246" text-anchor="middle" font-size="9" fill="#8A8A84">15 shot-class logits</text>
<text x="670.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">256 → 128 → 64 → 15</text>
<text x="670.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#993C1D">narrow bottleneck — tail classes lost</text>

<!-- (d) D4 MLP-BN -->
<rect x="813" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="827" y="55" width="104" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="839" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(d) D4 · MLP-BN</text>
<text x="931.5" y="100" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<polygon points="856.5,126 1006.5,126 1006.5,148 856.5,148" fill="#E4EBE7"/>
<polygon points="856.5,166 1006.5,166 948.5,190 914.5,190" fill="#E4EBE7"/>
<rect x="856.5" y="108" width="150" height="18" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="931.5" y="121" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">256</text>
<rect x="856.5" y="148" width="150" height="18" rx="4" fill="#FCEFD9" stroke="#E8B766" stroke-width="1.4"/>
<text x="931.5" y="161" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">256</text>
<text x="851" y="156" text-anchor="end" font-size="8.5" font-weight="600" fill="#BA7517">+ BN</text>
<text x="851" y="167" text-anchor="end" font-size="8.5" font-weight="600" fill="#BA7517">+ dropout</text>
<rect x="914.5" y="190" width="34" height="18" rx="4" fill="#534AB7"/>
<text x="931.5" y="203" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFFFFF">15</text>
<text x="931.5" y="224" text-anchor="middle" font-size="9" fill="#8A8A84">15 shot-class logits</text>
<text x="931.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">256 → 256 → 15 · winner</text>
<text x="931.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B66">full width kept — regularised, not compressed</text>

</svg>
