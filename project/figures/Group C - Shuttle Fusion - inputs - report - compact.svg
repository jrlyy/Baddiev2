<svg width="100%" viewBox="0 0 660 130" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Shuttle fusion — input representation</title>
<desc>Three input representations to the shuttle fusion ablations: skeleton only, skeleton plus a shuttle node attached to the wrist joints, and skeleton with a separate shuttle trajectory stream.</desc>

<defs>
  <g id="skel">
    <path d="M0 0L0 21 M0 21L-23 25 M0 21L23 25 M-23 25L-35 53 M-35 53L-39 78
             M23 25L35 41 M35 41L51 16 M0 21L2 74 M2 74L-16 76 M2 74L18 76
             M-16 76L-21 110 M-21 110L-25 145 M18 76L21 113 M21 113L23 147"
          fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="51" y1="16" x2="61" y2="6" stroke="currentColor" stroke-width="2.8"/>
    <ellipse cx="67" cy="0" rx="10.5" ry="7.5" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <g fill="currentColor" stroke="#FFFFFF" stroke-width="1.4">
      <circle cx="0" cy="0" r="8"/><circle cx="0" cy="21" r="5"/>
      <circle cx="-23" cy="25" r="5"/><circle cx="23" cy="25" r="5"/>
      <circle cx="-35" cy="53" r="5"/><circle cx="35" cy="41" r="5"/>
      <circle cx="-39" cy="78" r="5"/><circle cx="51" cy="16" r="5"/>
      <circle cx="2" cy="74" r="5"/>
      <circle cx="-16" cy="76" r="5"/><circle cx="18" cy="76" r="5"/>
      <circle cx="-21" cy="110" r="5"/><circle cx="21" cy="113" r="5"/>
      <circle cx="-25" cy="145" r="5"/><circle cx="23" cy="147" r="5"/>
    </g>
  </g>
</defs>

<!-- (a) C1 No shuttle -->
<g transform="translate(-92,0)">
  <text x="192" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A2E">(a) C1 · No shuttle — baseline</text>
  <use href="#skel" transform="translate(192,38) scale(0.32)" color="#534AB7"/>
  <text x="192" y="110" text-anchor="middle" font-size="9.5" fill="#6B6B66">Skeleton only · 17 nodes</text>
</g>

<!-- (b) C2 Shuttle as graph node -->
<g transform="translate(-230,0)">
  <text x="540" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A2E">(b) C2 · Shuttle as graph node</text>
  <use href="#skel" transform="translate(534,38) scale(0.32)" color="#534AB7"/>
  <line x1="576" y1="54" x2="550.3" y2="43.1" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="3 2.5"/>
  <line x1="576" y1="54" x2="521.5" y2="63" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="3 2.5"/>
  <circle cx="576" cy="54" r="5.5" fill="#EF9F27"/>
  <text x="586" y="57" font-size="8.5" font-weight="600" fill="#BA7517">shuttle node</text>
  <text x="540" y="110" text-anchor="middle" font-size="9.5" fill="#6B6B66">Skeleton graph + shuttle node (idx 34)</text>
</g>

<!-- (c) C3 Cross-attention -->
<g transform="translate(-358,0)">
  <text x="888" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A2E">(c) C3 · Cross-attention · winner</text>
  <use href="#skel" transform="translate(820,38) scale(0.27)" color="#534AB7"/>
  <g stroke="#EF9F27" stroke-width="2" fill="none" stroke-dasharray="3.5 2.5">
    <path d="M928 70 Q956 30 984 64"/>
  </g>
  <g fill="#EF9F27">
    <circle cx="928" cy="70" r="2.6"/><circle cx="942" cy="48" r="2.6"/>
    <circle cx="956" cy="36" r="2.6"/><circle cx="970" cy="42" r="2.6"/>
    <circle cx="984" cy="64" r="4"/>
  </g>
  <text x="888" y="110" text-anchor="middle" font-size="9.5" fill="#6B6B66">Skeleton + separate shuttle-trajectory stream</text>
</g>

</svg>
