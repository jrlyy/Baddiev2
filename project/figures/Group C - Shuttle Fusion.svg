<svg width="100%" viewBox="0 0 1080 400" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Group C — Shuttle Fusion</title>
<desc>Three panels comparing shuttlecock fusion strategies: no shuttle baseline, shuttle as a graph node (mid-fusion), and shuttle cross-attention (late fusion).</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <g id="skel">
    <path d="M0 0L0 21 M0 21L-23 25 M0 21L23 25 M-23 25L-35 53 M-35 53L-39 78
             M23 25L35 41 M35 41L51 16 M0 21L2 74 M2 74L-16 76 M2 74L18 76
             M-16 76L-21 110 M-21 110L-25 145 M18 76L21 113 M21 113L23 147"
          fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="51" y1="16" x2="61" y2="6" stroke="currentColor" stroke-width="2.8"/>
    <ellipse cx="67" cy="0" rx="10.5" ry="7.5" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <g fill="currentColor" stroke="#FFFFFF" stroke-width="1.4">
      <circle cx="0" cy="0" r="8"/><circle cx="0" cy="21" r="5"/>
      <circle cx="-23" cy="25" r="5"/><circle cx="23" cy="25" r="5"/>
      <circle cx="-35" cy="53" r="5"/><circle cx="35" cy="41" r="5"/>
      <circle cx="-39" cy="78" r="5"/><circle cx="51" cy="16" r="5"/>
      <circle cx="2" cy="74" r="5"/>
      <circle cx="-16" cy="76" r="5"/><circle cx="18" cy="76" r="5"/>
      <circle cx="-21" cy="110" r="5"/><circle cx="21" cy="113" r="5"/>
      <circle cx="-25" cy="145" r="5"/><circle cx="23" cy="147" r="5"/>
    </g>
  </g>
</defs>

<text x="540" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">Group C — Shuttle Fusion</text>
<text x="540" y="50" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6B6B66">Where and how the shuttlecock trajectory is combined with the skeleton stream</text>

<!-- (a) C1 No shuttle -->
<rect x="30" y="64" width="324" height="290" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="44" y="55" width="124" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="56" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(a) C1 · No shuttle</text>
<use href="#skel" transform="translate(192,88) scale(0.32)" color="#534AB7"/>
<text x="192" y="158" text-anchor="middle" font-size="10.5" font-weight="600" fill="#4A4A47">Skeleton · 17 nodes</text>
<line x1="192" y1="162" x2="192" y2="178" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="117" y="180" width="150" height="32" rx="6" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="192" y="200" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">ST-GCN encoder</text>
<line x1="192" y1="212" x2="192" y2="230" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="208" y="225" font-size="9" fill="#8A8A84">256-d</text>
<rect x="117" y="232" width="150" height="32" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="192" y="252" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">MLP head</text>
<line x1="192" y1="264" x2="192" y2="280" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="142" y="282" width="100" height="24" rx="12" fill="#E7EFE9" stroke="#9DB0A4" stroke-width="1.1"/>
<text x="192" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">15 shot classes</text>
<text x="192" y="374" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">skeleton embedding straight</text>
<text x="192" y="389" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">to the classifier — baseline</text>

<!-- (b) C2 Shuttle as graph node -->
<rect x="378" y="64" width="324" height="290" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="392" y="55" width="196" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="404" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(b) C2 · Shuttle as graph node</text>
<use href="#skel" transform="translate(534,88) scale(0.32)" color="#534AB7"/>
<line x1="576" y1="104" x2="550.3" y2="93.1" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="3 2.5"/>
<line x1="576" y1="104" x2="521.5" y2="113" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="3 2.5"/>
<circle cx="576" cy="104" r="5.5" fill="#EF9F27"/>
<text x="586" y="107" font-size="9" font-weight="600" fill="#BA7517">shuttle node</text>
<text x="534" y="158" text-anchor="middle" font-size="10.5" font-weight="600" fill="#4A4A47">Skeleton graph + shuttle node</text>
<line x1="534" y1="162" x2="534" y2="178" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="459" y="180" width="150" height="32" rx="6" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="534" y="196" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">ST-GCN encoder</text>
<text x="534" y="207" text-anchor="middle" font-size="8.5" fill="#8A8A84">fused in every conv layer</text>
<line x1="534" y1="212" x2="534" y2="230" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="550" y="225" font-size="9" fill="#8A8A84">256-d</text>
<rect x="459" y="232" width="150" height="32" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="534" y="252" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">MLP head</text>
<line x1="534" y1="264" x2="534" y2="280" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="484" y="282" width="100" height="24" rx="12" fill="#E7EFE9" stroke="#9DB0A4" stroke-width="1.1"/>
<text x="534" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">15 shot classes</text>
<text x="540" y="374" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">shuttle joins the graph, fused</text>
<text x="540" y="389" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">through every conv — mid-fusion</text>

<!-- (c) C3 Cross-attention -->
<rect x="726" y="64" width="324" height="290" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="740" y="55" width="166" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="752" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(c) C3 · Cross-attention</text>

<use href="#skel" transform="translate(800,86) scale(0.27)" color="#534AB7"/>
<text x="800" y="146" text-anchor="middle" font-size="10" font-weight="600" fill="#4A4A47">Skeleton</text>
<rect x="745" y="152" width="110" height="28" rx="6" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="800" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">ST-GCN</text>
<text x="800" y="196" text-anchor="middle" font-size="9" fill="#8A8A84">256-d</text>

<g stroke="#EF9F27" stroke-width="2" fill="none" stroke-dasharray="3.5 2.5">
  <path d="M958 116 Q976 82 994 110"/>
</g>
<g fill="#EF9F27">
  <circle cx="958" cy="116" r="2.6"/><circle cx="968" cy="98" r="2.6"/>
  <circle cx="977" cy="89" r="2.6"/><circle cx="986" cy="93" r="2.6"/>
  <circle cx="994" cy="110" r="4"/>
</g>
<text x="976" y="146" text-anchor="middle" font-size="10" font-weight="600" fill="#4A4A47">Shuttle trajectory</text>
<rect x="921" y="152" width="110" height="28" rx="6" fill="#FCEFD9" stroke="#E8B766" stroke-width="1.2"/>
<text x="976" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">1-D CNN</text>
<text x="976" y="196" text-anchor="middle" font-size="9" fill="#8A8A84">128-d</text>

<line x1="800" y1="200" x2="856" y2="210" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<line x1="976" y1="200" x2="920" y2="210" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="798" y="210" width="180" height="30" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="888" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">cross-attention · 4 heads</text>
<line x1="888" y1="240" x2="888" y2="254" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="813" y="256" width="150" height="28" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="888" y="274" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">MLP head</text>
<line x1="888" y1="284" x2="888" y2="298" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="838" y="300" width="100" height="24" rx="12" fill="#E7EFE9" stroke="#9DB0A4" stroke-width="1.1"/>
<text x="888" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">15 shot classes</text>
<text x="888" y="374" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">streams specialise, then attention</text>
<text x="888" y="389" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">fuses — late fusion · winner</text>

</svg>
