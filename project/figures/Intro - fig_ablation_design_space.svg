<svg width="100%" viewBox="0 0 760 470" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Run 6 ablation design space</title>
<desc>Six ablation axes (input, feature enrichment, temporal window, pooling, shuttle fusion, classifier head) with the variants tested per axis. Stars mark the winning choice that defines the final model.</desc>
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .axis  { font-size: 11.5px; font-weight: 600; fill: #1a1a1a; }
  .sub   { font-size: 9.5px; fill: #6b6b6b; }
  .chip  { font-size: 10.5px; fill: #1a1a1a; }
  .chipsub { font-size: 9px; fill: #555; }
  .win   { font-size: 10.5px; font-weight: 700; }
  .hdr   { font-size: 13px; font-weight: 700; fill: #111; }
  .note  { font-size: 9.5px; fill: #777; font-style: italic; }
</style>

<text x="20" y="26" class="hdr">Ablation design space — what we tested (★ = winning choice)</text>
<line x1="20" y1="34" x2="740" y2="34" stroke="#ccc" stroke-width="1"/>

<!-- Axis 1: Input representation (Group A) -->
<g transform="translate(0,48)">
  <text x="20" y="16" class="axis">Input representation</text>
  <text x="20" y="30" class="sub">Group A</text>
  <rect x="165" y="2" width="120" height="34" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="225" y="17" text-anchor="middle" class="chip">dual&#160;&#160;V = 34</text>
  <text x="225" y="30" text-anchor="middle" class="chipsub">both players</text>
  <rect x="295" y="2" width="120" height="34" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1.4"/>
  <text x="355" y="17" text-anchor="middle" class="chip">single&#160;&#160;V = 17 &#9733;</text>
  <text x="355" y="30" text-anchor="middle" class="chipsub">hitter only</text>
  <rect x="430" y="2" width="95" height="34" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="477" y="17" text-anchor="middle" class="chip">L2 (10-dim)</text>
  <text x="477" y="30" text-anchor="middle" class="chipsub">joint XY+</text>
  <rect x="535" y="2" width="95" height="34" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1.4"/>
  <text x="582" y="17" text-anchor="middle" class="chip">L3 (14-dim) &#9733;</text>
  <text x="582" y="30" text-anchor="middle" class="chipsub">+ angles</text>
  <rect x="645" y="2" width="95" height="34" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="1.4"/>
  <text x="692" y="17" text-anchor="middle" class="chip">hitter flag: off &#9733;</text>
  <text x="692" y="30" text-anchor="middle" class="chipsub">vs. +1 dim</text>
</g>

<!-- Axis 2: Feature enrichment (Group A+) -->
<g transform="translate(0,98)">
  <text x="20" y="16" class="axis">Feature enrichment</text>
  <text x="20" y="30" class="sub">Group A+</text>
  <rect x="165" y="2" width="130" height="34" rx="6" fill="#FDE8AA" stroke="#C07A15" stroke-width="1.4"/>
  <text x="230" y="17" text-anchor="middle" class="chip">none &#9733;</text>
  <text x="230" y="30" text-anchor="middle" class="chipsub">L3 as-is</text>
  <rect x="305" y="2" width="130" height="34" rx="6" fill="#FEF3DC" stroke="#C07A15" stroke-width="0.8"/>
  <text x="370" y="17" text-anchor="middle" class="chip">+ bone vectors</text>
  <text x="370" y="30" text-anchor="middle" class="chipsub">limb dir &amp; length</text>
  <rect x="445" y="2" width="130" height="34" rx="6" fill="#FEF3DC" stroke="#C07A15" stroke-width="0.8"/>
  <text x="510" y="17" text-anchor="middle" class="chip">+ bbox norm</text>
  <text x="510" y="30" text-anchor="middle" class="chipsub">scale-invariant</text>
  <rect x="585" y="2" width="155" height="34" rx="6" fill="#FEF3DC" stroke="#C07A15" stroke-width="0.8"/>
  <text x="662" y="17" text-anchor="middle" class="chip">+ bones + bbox</text>
  <text x="662" y="30" text-anchor="middle" class="chipsub">16-dim total</text>
</g>

<!-- Axis 3: Temporal window (Group B) -->
<g transform="translate(0,148)">
  <text x="20" y="16" class="axis">Temporal window</text>
  <text x="20" y="30" class="sub">Group B &#183; preprocessing</text>
  <rect x="165" y="2" width="200" height="34" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="1.4"/>
  <text x="265" y="17" text-anchor="middle" class="chip">fixed &#177;16 frames &#160; T = 32 &#9733;</text>
  <text x="265" y="30" text-anchor="middle" class="chipsub">no resampling, centred on hit</text>
  <rect x="375" y="2" width="200" height="34" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="475" y="17" text-anchor="middle" class="chip">variable window &#8594; T = 32</text>
  <text x="475" y="30" text-anchor="middle" class="chipsub">prev-hit to next-hit, resampled</text>
</g>

<!-- Axis 4: Pooling (Group B+) -->
<g transform="translate(0,198)">
  <text x="20" y="16" class="axis">Pooling strategy</text>
  <text x="20" y="30" class="sub">Group B+</text>
  <rect x="165" y="2" width="135" height="34" rx="6" fill="#9DB9E6" stroke="#3C5FA0" stroke-width="1.4"/>
  <text x="232" y="17" text-anchor="middle" class="chip">mean pool &#9733;</text>
  <text x="232" y="30" text-anchor="middle" class="chipsub">global avg, no params</text>
  <rect x="310" y="2" width="135" height="34" rx="6" fill="#E8EDF8" stroke="#5A78B8" stroke-width="0.8"/>
  <text x="377" y="17" text-anchor="middle" class="chip">attention pool</text>
  <text x="377" y="30" text-anchor="middle" class="chipsub">softmax over T &amp; V</text>
  <rect x="455" y="2" width="115" height="34" rx="6" fill="#E8EDF8" stroke="#5A78B8" stroke-width="0.8"/>
  <text x="512" y="17" text-anchor="middle" class="chip">max pool</text>
  <text x="512" y="30" text-anchor="middle" class="chipsub">element-wise max</text>
  <rect x="580" y="2" width="160" height="34" rx="6" fill="#E8EDF8" stroke="#5A78B8" stroke-width="0.8"/>
  <text x="660" y="17" text-anchor="middle" class="chip">temporal transformer</text>
  <text x="660" y="30" text-anchor="middle" class="chipsub">CLS-token aggregation</text>
</g>

<!-- Axis 5: Shuttle fusion (Group C) -->
<g transform="translate(0,248)">
  <text x="20" y="16" class="axis">Shuttle fusion</text>
  <text x="20" y="30" class="sub">Group C</text>
  <rect x="165" y="2" width="165" height="34" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="247" y="17" text-anchor="middle" class="chip">none — skeleton only</text>
  <text x="247" y="30" text-anchor="middle" class="chipsub">baseline</text>
  <rect x="340" y="2" width="165" height="34" rx="6" fill="#C8EEE0" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="422" y="17" text-anchor="middle" class="chip">graph node (V+1)</text>
  <text x="422" y="30" text-anchor="middle" class="chipsub">early fusion, pre-encoder</text>
  <rect x="515" y="2" width="225" height="34" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.6"/>
  <text x="627" y="17" text-anchor="middle" class="chip win">cross-attention &#9733;</text>
  <text x="627" y="30" text-anchor="middle" class="chipsub">late fusion, post-encoder (BST-style)</text>
</g>

<!-- Axis 6: Classifier head (Group D) -->
<g transform="translate(0,298)">
  <text x="20" y="16" class="axis">Classifier head</text>
  <text x="20" y="30" class="sub">Group D</text>
  <rect x="165" y="2" width="125" height="34" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="227" y="17" text-anchor="middle" class="chip">linear</text>
  <text x="227" y="30" text-anchor="middle" class="chipsub">256 &#8594; C</text>
  <rect x="300" y="2" width="125" height="34" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="362" y="17" text-anchor="middle" class="chip">MLP-1</text>
  <text x="362" y="30" text-anchor="middle" class="chipsub">256 &#8594; 128 &#8594; C</text>
  <rect x="435" y="2" width="135" height="34" rx="6" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/>
  <text x="502" y="17" text-anchor="middle" class="chip">MLP-2</text>
  <text x="502" y="30" text-anchor="middle" class="chipsub">256 &#8594; 128 &#8594; 64 &#8594; C</text>
  <rect x="580" y="2" width="160" height="34" rx="6" fill="#E07550" stroke="#993C1D" stroke-width="0.8"/>
  <text x="660" y="17" text-anchor="middle" class="chip">MLP-BN</text>
  <text x="660" y="30" text-anchor="middle" class="chipsub">wide hidden + BN + dropout</text>
</g>

<line x1="20" y1="346" x2="740" y2="346" stroke="#ccc" stroke-width="1"/>
<text x="20" y="338" class="note">Group D head variants tested separately on the C-winner; D is reported as a table, not adopted into the final config.</text>

<!-- Winner summary strip -->
<g transform="translate(0,358)">
  <rect x="20" y="0" width="720" height="92" rx="8" fill="#F4FBF8" stroke="#0F6E56" stroke-width="1"/>
  <text x="34" y="22" class="hdr" fill="#0F6E56">★ Final model = winning choice on every axis</text>
  <text x="34" y="44" class="chip">single player (V = 17)  ·  L3 features (14-dim)  ·  no hitter flag  ·  no enrichment</text>
  <text x="34" y="62" class="chip">fixed ±16-frame window (T = 32)  ·  mean pooling  ·  shuttle cross-attention fusion</text>
  <text x="34" y="82" class="note">config: results/ablations_run6/_final_config.json  —  winner_name = "C3_shuttle_xattn",  test macro-F1 ≈ 0.652</text>
</g>

</svg>
