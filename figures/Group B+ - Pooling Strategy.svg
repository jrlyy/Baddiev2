<svg width="100%" viewBox="0 0 1080 380" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Group B+ — Pooling Strategy</title>
<desc>Four ways to collapse the ST-GCN feature map into one shot embedding: uniform mean pooling, element-wise max, learned attention weights, and a temporal transformer with a CLS read-out token.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="540" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">Group B+ — Pooling Strategy</text>
<text x="540" y="50" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6B6B66">Collapsing the ST-GCN feature map (T′ × V cells, each a 256-d vector) into one shot embedding</text>

<!-- (a) Mean pool -->
<rect x="30" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="44" y="55" width="108" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="56" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(a) Mean pool</text>
<text x="148.5" y="98" text-anchor="middle" font-size="9" fill="#8A8A84">T′ × V feature map</text>
<g>
  <rect x="100.5" y="104" width="96" height="64" fill="#D4E1D9" stroke="#9DB0A4" stroke-width="1"/>
  <g stroke="#B7C7BD" stroke-width="0.8">
    <line x1="116.5" y1="104" x2="116.5" y2="168"/><line x1="132.5" y1="104" x2="132.5" y2="168"/>
    <line x1="148.5" y1="104" x2="148.5" y2="168"/><line x1="164.5" y1="104" x2="164.5" y2="168"/>
    <line x1="180.5" y1="104" x2="180.5" y2="168"/>
    <line x1="100.5" y1="120" x2="196.5" y2="120"/><line x1="100.5" y1="136" x2="196.5" y2="136"/>
    <line x1="100.5" y1="152" x2="196.5" y2="152"/>
  </g>
</g>
<text x="148.5" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">mean — every cell equal</text>
<line x1="148.5" y1="194" x2="148.5" y2="210" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="93.5" y="212" width="110" height="16" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<g stroke="#9B93D4" stroke-width="0.7"><line x1="115.5" y1="212" x2="115.5" y2="228"/><line x1="137.5" y1="212" x2="137.5" y2="228"/><line x1="159.5" y1="212" x2="159.5" y2="228"/><line x1="181.5" y1="212" x2="181.5" y2="228"/></g>
<text x="148.5" y="244" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<text x="148.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">uniform average · winner</text>
<text x="148.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B66">no parameters — best macro-F1</text>

<!-- (b) Max pool -->
<rect x="291" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="305" y="55" width="100" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="317" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(b) Max pool</text>
<text x="409.5" y="98" text-anchor="middle" font-size="9" fill="#8A8A84">T′ × V feature map</text>
<rect x="361.5" y="104" width="96" height="64" fill="#ECF1EE" stroke="#9DB0A4" stroke-width="1"/>
<g fill="#534AB7">
  <rect x="377.5" y="104" width="16" height="16"/><rect x="425.5" y="120" width="16" height="16"/>
  <rect x="361.5" y="152" width="16" height="16"/><rect x="409.5" y="136" width="16" height="16"/>
</g>
<g stroke="#B7C7BD" stroke-width="0.8">
  <line x1="377.5" y1="104" x2="377.5" y2="168"/><line x1="393.5" y1="104" x2="393.5" y2="168"/>
  <line x1="409.5" y1="104" x2="409.5" y2="168"/><line x1="425.5" y1="104" x2="425.5" y2="168"/>
  <line x1="441.5" y1="104" x2="441.5" y2="168"/>
  <line x1="361.5" y1="120" x2="457.5" y2="120"/><line x1="361.5" y1="136" x2="457.5" y2="136"/>
  <line x1="361.5" y1="152" x2="457.5" y2="152"/>
</g>
<text x="409.5" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">max — peak activation</text>
<line x1="409.5" y1="194" x2="409.5" y2="210" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="354.5" y="212" width="110" height="16" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<g stroke="#9B93D4" stroke-width="0.7"><line x1="376.5" y1="212" x2="376.5" y2="228"/><line x1="398.5" y1="212" x2="398.5" y2="228"/><line x1="420.5" y1="212" x2="420.5" y2="228"/><line x1="442.5" y1="212" x2="442.5" y2="228"/></g>
<text x="409.5" y="244" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<text x="409.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">element-wise maximum</text>
<text x="409.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B66">keeps peaks, drops context</text>

<!-- (c) Attention pool -->
<rect x="552" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="566" y="55" width="124" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="578" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(c) Attention pool</text>
<text x="670.5" y="98" text-anchor="middle" font-size="9" fill="#8A8A84">T′ × V feature map</text>
<rect x="622.5" y="104" width="96" height="64" fill="#FFFFFF" stroke="#9DB0A4" stroke-width="1"/>
<g fill="#534AB7">
  <rect x="622.5" y="104" width="16" height="16" fill-opacity="0.30"/><rect x="638.5" y="104" width="16" height="16" fill-opacity="0.65"/><rect x="654.5" y="104" width="16" height="16" fill-opacity="0.20"/><rect x="670.5" y="104" width="16" height="16" fill-opacity="0.85"/><rect x="686.5" y="104" width="16" height="16" fill-opacity="0.45"/><rect x="702.5" y="104" width="16" height="16" fill-opacity="0.25"/>
  <rect x="622.5" y="120" width="16" height="16" fill-opacity="0.55"/><rect x="638.5" y="120" width="16" height="16" fill-opacity="0.90"/><rect x="654.5" y="120" width="16" height="16" fill-opacity="0.35"/><rect x="670.5" y="120" width="16" height="16" fill-opacity="0.60"/><rect x="686.5" y="120" width="16" height="16" fill-opacity="0.25"/><rect x="702.5" y="120" width="16" height="16" fill-opacity="0.40"/>
  <rect x="622.5" y="136" width="16" height="16" fill-opacity="0.20"/><rect x="638.5" y="136" width="16" height="16" fill-opacity="0.45"/><rect x="654.5" y="136" width="16" height="16" fill-opacity="0.70"/><rect x="670.5" y="136" width="16" height="16" fill-opacity="0.30"/><rect x="686.5" y="136" width="16" height="16" fill-opacity="0.80"/><rect x="702.5" y="136" width="16" height="16" fill-opacity="0.35"/>
  <rect x="622.5" y="152" width="16" height="16" fill-opacity="0.40"/><rect x="638.5" y="152" width="16" height="16" fill-opacity="0.25"/><rect x="654.5" y="152" width="16" height="16" fill-opacity="0.55"/><rect x="670.5" y="152" width="16" height="16" fill-opacity="0.35"/><rect x="686.5" y="152" width="16" height="16" fill-opacity="0.50"/><rect x="702.5" y="152" width="16" height="16" fill-opacity="0.20"/>
</g>
<rect x="622.5" y="104" width="96" height="64" fill="none" stroke="#9DB0A4" stroke-width="1"/>
<text x="670.5" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">learned soft weights</text>
<line x1="670.5" y1="194" x2="670.5" y2="210" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="615.5" y="212" width="110" height="16" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<g stroke="#9B93D4" stroke-width="0.7"><line x1="637.5" y1="212" x2="637.5" y2="228"/><line x1="659.5" y1="212" x2="659.5" y2="228"/><line x1="681.5" y1="212" x2="681.5" y2="228"/><line x1="703.5" y1="212" x2="703.5" y2="228"/></g>
<text x="670.5" y="244" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<text x="670.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">softmax-weighted sum</text>
<text x="670.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6B6B66">learns weights ≈ uniform — no gain</text>

<!-- (d) Temporal transformer + CLS -->
<rect x="813" y="64" width="237" height="256" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="827" y="55" width="172" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="839" y="71" font-size="12.5" font-weight="600" fill="#4A4A47">(d) Temporal transformer</text>
<text x="931.5" y="98" text-anchor="middle" font-size="9" fill="#8A8A84">T′ × V map  +  CLS token</text>
<rect x="869.5" y="106" width="84" height="56" fill="#ECF1EE" stroke="#9DB0A4" stroke-width="1"/>
<g stroke="#B7C7BD" stroke-width="0.8">
  <line x1="883.5" y1="106" x2="883.5" y2="162"/><line x1="897.5" y1="106" x2="897.5" y2="162"/>
  <line x1="911.5" y1="106" x2="911.5" y2="162"/><line x1="925.5" y1="106" x2="925.5" y2="162"/>
  <line x1="939.5" y1="106" x2="939.5" y2="162"/>
  <line x1="869.5" y1="120" x2="953.5" y2="120"/><line x1="869.5" y1="134" x2="953.5" y2="134"/>
  <line x1="869.5" y1="148" x2="953.5" y2="148"/>
</g>
<rect x="963.5" y="120" width="20" height="28" rx="3" fill="#EF9F27"/>
<text x="973.5" y="138" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">CLS</text>
<g stroke="#C9A06A" stroke-width="1" fill="none">
  <line x1="953.5" y1="124" x2="962.5" y2="130" marker-end="url(#arr)"/>
  <line x1="953.5" y1="140" x2="962.5" y2="138" marker-end="url(#arr)"/>
</g>
<text x="931.5" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">self-attention, read CLS</text>
<line x1="973.5" y1="190" x2="973.5" y2="208" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="918.5" y="210" width="110" height="16" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<g stroke="#9B93D4" stroke-width="0.7"><line x1="940.5" y1="210" x2="940.5" y2="226"/><line x1="962.5" y1="210" x2="962.5" y2="226"/><line x1="984.5" y1="210" x2="984.5" y2="226"/><line x1="1006.5" y1="210" x2="1006.5" y2="226"/></g>
<text x="973.5" y="242" text-anchor="middle" font-size="9" fill="#8A8A84">256-d shot embedding</text>
<text x="931.5" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#3D3D3A">transformer + CLS read-out</text>
<text x="931.5" y="305" text-anchor="middle" font-size="10.5" font-style="italic" fill="#993C1D">underfits at T′ = 8 — worst F1</text>

</svg>
