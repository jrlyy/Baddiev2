<svg width="100%" viewBox="0 0 1080 270" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Shuttle fusion strategies</title>
<desc>Three shuttlecock fusion strategies: no shuttle baseline, shuttle added as a graph node fused in every conv layer, and a separate shuttle CNN fused into the skeleton embedding by cross-attention.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <g id="skel">
    <path d="M0 0L0 21 M0 21L-23 25 M0 21L23 25 M-23 25L-35 53 M-35 53L-39 78
             M23 25L35 41 M35 41L51 16 M0 21L2 74 M2 74L-16 76 M2 74L18 76
             M-16 76L-21 110 M-21 110L-25 145 M18 76L21 113 M21 113L23 147"
          fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="51" y1="16" x2="61" y2="6" stroke="currentColor" stroke-width="2.8"/>
    <ellipse cx="67" cy="0" rx="10.5" ry="7.5" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <g fill="currentColor" stroke="#FFFFFF" stroke-width="1.4">
      <circle cx="0" cy="0" r="8"/><circle cx="0" cy="21" r="5"/>
      <circle cx="-23" cy="25" r="5"/><circle cx="23" cy="25" r="5"/>
      <circle cx="-35" cy="53" r="5"/><circle cx="35" cy="41" r="5"/>
      <circle cx="-39" cy="78" r="5"/><circle cx="51" cy="16" r="5"/>
      <circle cx="2" cy="74" r="5"/>
      <circle cx="-16" cy="76" r="5"/><circle cx="18" cy="76" r="5"/>
      <circle cx="-21" cy="110" r="5"/><circle cx="21" cy="113" r="5"/>
      <circle cx="-25" cy="145" r="5"/><circle cx="23" cy="147" r="5"/>
    </g>
  </g>
</defs>

<!-- (a) C1 No shuttle -->
<text x="192" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(a) C1 · No shuttle — baseline</text>
<use href="#skel" transform="translate(192,36) scale(0.32)" color="#534AB7"/>
<text x="192" y="106" text-anchor="middle" font-size="9.5" fill="#6B6B66">Skeleton · 17 nodes</text>
<line x1="192" y1="110" x2="192" y2="126" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="117" y="128" width="150" height="30" rx="6" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="192" y="147" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">ST-GCN encoder</text>
<line x1="192" y1="158" x2="192" y2="176" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="208" y="171" font-size="9" fill="#8A8A84">256-d</text>
<rect x="117" y="178" width="150" height="30" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="192" y="197" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">MLP head</text>
<line x1="192" y1="208" x2="192" y2="224" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="142" y="226" width="100" height="22" rx="11" fill="#E7EFE9" stroke="#9DB0A4" stroke-width="1.1"/>
<text x="192" y="241" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">15 shot classes</text>

<!-- (b) C2 Shuttle as graph node -->
<text x="540" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(b) C2 · Shuttle as graph node — mid-fusion</text>
<use href="#skel" transform="translate(534,36) scale(0.32)" color="#534AB7"/>
<line x1="576" y1="52" x2="550.3" y2="41.1" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="3 2.5"/>
<line x1="576" y1="52" x2="521.5" y2="61" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="3 2.5"/>
<circle cx="576" cy="52" r="5.5" fill="#EF9F27"/>
<text x="586" y="55" font-size="8.5" font-weight="600" fill="#BA7517">shuttle node</text>
<text x="540" y="106" text-anchor="middle" font-size="9.5" fill="#6B6B66">Skeleton graph + shuttle node</text>
<line x1="540" y1="110" x2="540" y2="126" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="465" y="128" width="150" height="30" rx="6" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="540" y="143" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">ST-GCN encoder</text>
<text x="540" y="154" text-anchor="middle" font-size="8" fill="#8A8A84">fused in every conv layer</text>
<line x1="540" y1="158" x2="540" y2="176" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="556" y="171" font-size="9" fill="#8A8A84">256-d</text>
<rect x="465" y="178" width="150" height="30" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="540" y="197" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3D3D3A">MLP head</text>
<line x1="540" y1="208" x2="540" y2="224" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="490" y="226" width="100" height="22" rx="11" fill="#E7EFE9" stroke="#9DB0A4" stroke-width="1.1"/>
<text x="540" y="241" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">15 shot classes</text>

<!-- (c) C3 Cross-attention -->
<text x="888" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(c) C3 · Cross-attention — late fusion · winner</text>
<use href="#skel" transform="translate(800,34) scale(0.27)" color="#534AB7"/>
<text x="800" y="90" text-anchor="middle" font-size="9.5" fill="#6B6B66">Skeleton</text>
<rect x="745" y="96" width="110" height="26" rx="6" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<text x="800" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">ST-GCN</text>
<text x="800" y="138" text-anchor="middle" font-size="9" fill="#8A8A84">256-d</text>

<g stroke="#EF9F27" stroke-width="2" fill="none" stroke-dasharray="3.5 2.5">
  <path d="M958 64 Q976 32 994 58"/>
</g>
<g fill="#EF9F27">
  <circle cx="958" cy="64" r="2.6"/><circle cx="968" cy="46" r="2.6"/>
  <circle cx="977" cy="38" r="2.6"/><circle cx="986" cy="42" r="2.6"/>
  <circle cx="994" cy="58" r="4"/>
</g>
<text x="976" y="90" text-anchor="middle" font-size="9.5" fill="#6B6B66">Shuttle trajectory</text>
<rect x="921" y="96" width="110" height="26" rx="6" fill="#FCEFD9" stroke="#E8B766" stroke-width="1.2"/>
<text x="976" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">1-D CNN</text>
<text x="976" y="138" text-anchor="middle" font-size="9" fill="#8A8A84">128-d</text>

<line x1="800" y1="142" x2="856" y2="152" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<line x1="976" y1="142" x2="920" y2="152" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="798" y="152" width="180" height="28" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="888" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">cross-attention · 4 heads</text>
<line x1="888" y1="180" x2="888" y2="194" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="813" y="196" width="150" height="26" rx="6" fill="#F0F4F1" stroke="#B9C9BF" stroke-width="1.2"/>
<text x="888" y="213" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3A">MLP head</text>
<line x1="888" y1="222" x2="888" y2="236" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="838" y="238" width="100" height="22" rx="11" fill="#E7EFE9" stroke="#9DB0A4" stroke-width="1.1"/>
<text x="888" y="253" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3D3D3A">15 shot classes</text>

</svg>
