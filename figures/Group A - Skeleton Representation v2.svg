<svg width="100%" viewBox="0 0 1080 632" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Group A — Skeleton Representation</title>
<desc>Five panels of the Group A design space: single and dual player skeletons at feature layers L2 and L3, a hitter-identity channel, and bone vectors.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrs" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <g id="skel">
    <path d="M0 0L0 21 M0 21L-23 25 M0 21L23 25 M-23 25L-35 53 M-35 53L-39 78
             M23 25L35 41 M35 41L51 16 M0 21L2 74 M2 74L-16 76 M2 74L18 76
             M-16 76L-21 110 M-21 110L-25 145 M18 76L21 113 M21 113L23 147"
          fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="51" y1="16" x2="61" y2="6" stroke="currentColor" stroke-width="2.8"/>
    <ellipse cx="67" cy="0" rx="10.5" ry="7.5" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <g fill="currentColor" stroke="#FFFFFF" stroke-width="1.4">
      <circle cx="0" cy="0" r="8"/><circle cx="0" cy="21" r="5"/>
      <circle cx="-23" cy="25" r="5"/><circle cx="23" cy="25" r="5"/>
      <circle cx="-35" cy="53" r="5"/><circle cx="35" cy="41" r="5"/>
      <circle cx="-39" cy="78" r="5"/><circle cx="51" cy="16" r="5"/>
      <circle cx="2" cy="74" r="5"/>
      <circle cx="-16" cy="76" r="5"/><circle cx="18" cy="76" r="5"/>
      <circle cx="-21" cy="110" r="5"/><circle cx="21" cy="113" r="5"/>
      <circle cx="-25" cy="145" r="5"/><circle cx="23" cy="147" r="5"/>
    </g>
  </g>
</defs>

<text x="540" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">Group A — Skeleton Representation</text>
<text x="540" y="50" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6B6B66">Player count, feature-layer depth, hitter identity, and alternative node encodings</text>

<!-- ROW 1 -->
<!-- (a) Single L2 -->
<rect x="30" y="66" width="324" height="230" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="44" y="57" width="118" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="56" y="73" font-size="12.5" font-weight="600" fill="#4A4A47">(a) Single · L2</text>
<use href="#skel" transform="translate(175,116) scale(0.9)" color="#534AB7"/>
<line x1="278" y1="130" x2="232" y2="130" stroke="#534AB7" stroke-width="1.4" marker-end="url(#arrs)"/>
<text x="281" y="134" font-size="11.5" font-weight="600" fill="#534AB7">(x, y)</text>
<text x="192" y="312" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">hitter only · 17 nodes</text>
<text x="192" y="327" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">L2: 10 dims / node</text>

<!-- (b) Single L3 -->
<rect x="378" y="66" width="324" height="230" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="392" y="57" width="118" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="404" y="73" font-size="12.5" font-weight="600" fill="#4A4A47">(b) Single · L3</text>
<use href="#skel" transform="translate(523,116) scale(0.9)" color="#534AB7"/>
<g stroke="#EF9F27" stroke-width="2">
  <line x1="569" y1="130" x2="585" y2="120" marker-end="url(#arrs)"/>
  <line x1="488" y1="176" x2="475" y2="187" marker-end="url(#arrs)"/>
  <line x1="542" y1="207" x2="553" y2="219" marker-end="url(#arrs)"/>
</g>
<line x1="624" y1="200" x2="606" y2="192" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrs)"/>
<text x="627" y="204" font-size="11" fill="#BA7517">velocity</text>
<line x1="626" y1="118" x2="582" y2="118" stroke="#534AB7" stroke-width="1.4" marker-end="url(#arrs)"/>
<text x="629" y="122" font-size="11.5" font-weight="600" fill="#534AB7">+ angles</text>
<text x="540" y="312" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">hitter only · 17 nodes</text>
<text x="540" y="327" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">L3: 14 dims / node  (Group A winner)</text>

<!-- (c) Dual L2 -->
<rect x="726" y="66" width="324" height="230" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="740" y="57" width="112" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="752" y="73" font-size="12.5" font-weight="600" fill="#4A4A47">(c) Dual · L2</text>
<text x="876" y="100" text-anchor="middle" font-size="10.5" font-weight="600" fill="#993C1D">Opponent</text>
<use href="#skel" transform="translate(876,108) scale(0.45)" color="#993C1D"/>
<line x1="746" y1="186" x2="1030" y2="186" stroke="#9DB0A4" stroke-width="1.1" stroke-dasharray="5 4"/>
<text x="1026" y="182" text-anchor="end" font-size="9" font-style="italic" fill="#8A9990">Y-sort (top / bottom)</text>
<use href="#skel" transform="translate(876,202) scale(0.45)" color="#534AB7"/>
<text x="876" y="288" text-anchor="middle" font-size="10.5" font-weight="600" fill="#534AB7">Hitter</text>
<text x="888" y="312" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">both players · 34 nodes</text>
<text x="888" y="327" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">L2: 10 dims / node</text>

<!-- ROW 2 (centered: panels (d) and (e)) -->
<!-- (d) Dual L2 + Hitter ID -->
<rect x="204" y="356" width="324" height="230" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="218" y="347" width="178" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="230" y="363" font-size="12.5" font-weight="600" fill="#4A4A47">(d) Dual · L2 + Hitter ID</text>
<text x="354" y="390" text-anchor="middle" font-size="10.5" font-weight="600" fill="#993C1D">Opponent · h = 0</text>
<use href="#skel" transform="translate(354,398) scale(0.45)" color="#993C1D"/>
<line x1="224" y1="476" x2="508" y2="476" stroke="#9DB0A4" stroke-width="1.1" stroke-dasharray="5 4"/>
<rect x="332" y="490" width="44" height="80" rx="3" fill="#EAC75A" opacity="0.25"/>
<use href="#skel" transform="translate(354,492) scale(0.45)" color="#534AB7"/>
<circle cx="354" cy="492" r="5.5" fill="none" stroke="#D9A521" stroke-width="1.6"/>
<text x="354" y="582" text-anchor="middle" font-size="10.5" font-weight="600" fill="#534AB7">Hitter · h = 1</text>
<circle cx="422" cy="505" r="4.5" fill="#D9A521"/>
<text x="432" y="508" font-size="9.5" fill="#B3870F">hitter channel</text>
<text x="366" y="602" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">+ binary h ∈ {0, 1} per node</text>
<text x="366" y="617" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">L2 + hitter: 11 dims / node</text>

<!-- (e) Bone vectors -->
<rect x="552" y="356" width="324" height="230" rx="7" fill="#EEF6F1" stroke="#D3E3D9" stroke-width="1"/>
<rect x="566" y="347" width="128" height="24" rx="6" fill="#FBFCFB" stroke="#D3E3D9" stroke-width="1"/>
<text x="578" y="363" font-size="12.5" font-weight="600" fill="#4A4A47">(e) Bone vectors</text>
<use href="#skel" transform="translate(697,406) scale(0.9)" color="#CFCEC8"/>
<g stroke="#EF9F27" stroke-width="2.4">
  <line x1="697" y1="424.9" x2="716.1" y2="428.5" marker-end="url(#arrs)"/>
  <line x1="717.7" y1="428.5" x2="727.1" y2="442.2" marker-end="url(#arrs)"/>
  <line x1="728.5" y1="442.9" x2="741.5" y2="421.5" marker-end="url(#arrs)"/>
  <line x1="697" y1="424.9" x2="677.9" y2="428.5" marker-end="url(#arrs)"/>
  <line x1="676.3" y1="428.5" x2="666.9" y2="452.3" marker-end="url(#arrs)"/>
  <line x1="665.5" y1="453.7" x2="662.9" y2="474.8" marker-end="url(#arrs)"/>
  <line x1="697" y1="424.9" x2="698.6" y2="471" marker-end="url(#arrs)"/>
  <line x1="698.8" y1="472.6" x2="714.1" y2="505.9" marker-end="url(#arrs)"/>
  <line x1="715.9" y1="507.7" x2="717.5" y2="536.5" marker-end="url(#arrs)"/>
  <line x1="698.8" y1="472.6" x2="679.7" y2="503.3" marker-end="url(#arrs)"/>
  <line x1="678.1" y1="505" x2="674.7" y2="534.7" marker-end="url(#arrs)"/>
</g>
<text x="714" y="602" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">node = child − parent (Δx, Δy)</text>
<text x="714" y="617" text-anchor="middle" font-size="11" font-style="italic" fill="#6B6B66">translation-invariant · 2 dims / node</text>

</svg>
