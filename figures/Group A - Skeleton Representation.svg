<line x1="978" y1="135" x2="962" y2="124" stroke="#C2740F" stroke-width="1" marker-end="url(#arrs)"/>
<text x="980" y="139" font-size="9.5" fill="#C2740F">flexion</text>

<rect x="868" y="232" width="192" height="15" rx="3" fill="#EEEEE9"/>
<rect x="868" y="232" width="27.4" height="15" rx="3" fill="#8B8B85"/>
