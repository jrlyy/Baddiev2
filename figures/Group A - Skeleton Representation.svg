<text x="977.8" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">court d</text>
<text x="1032.6" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">angles</text>

<text x="964" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#C2740F">+ joint flexion angles</text>
<text x="964" y="292" text-anchor="middle" font-size="11" fill="#3D3D3A">
  <tspan fill="#8B8B85">[ …,</tspan><tspan fill="#C2740F"> θ_elbow ×2, θ_knee ×2 ]</tspan>
</text>
<rect x="928" y="305" width="72" height="19" rx="9" fill="#EAE0CE"/>
