<text x="964" y="350" text-anchor="middle" font-size="10" font-style="italic" fill="#9A9992">how the limbs are bent</text>
<text x="964" y="372" text-anchor="middle" font-size="9.5" font-weight="600" fill="#534AB7">← Group A winner (A4)</text>

<!-- cumulative + connectors -->
<g>
  <circle cx="289" cy="239.5" r="11" fill="#FFFFFF" stroke="#C9C8C2" stroke-width="1.2"/>
  <text x="289" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#8B8B85">+</text>
  <circle cx="559" cy="239.5" r="11" fill="#FFFFFF" stroke="#C9C8C2" stroke-width="1.2"/>
  <text x="559" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#8B8B85">+</text>
  <circle cx="829" cy="239.5" r="11" fill="#FFFFFF" stroke="#C9C8C2" stroke-width="1.2"/>
  <text x="829" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#8B8B85">+</text>
</g>

<!-- ============================================================ -->
<!-- Row 2 — alternative representations                          -->
<!-- ============================================================ -->
<text x="30" y="428" font-size="12.5" font-weight="700" fill="#3D3D3A">Alternative representations (Group A+) — orthogonal swaps, <tspan font-style="italic" font-weight="400" fill="#6B6B66">not extra layers</tspan></text>

<!-- A7 Bone vectors -->
<rect x="30" y="444" width="525" height="220" rx="6" fill="#FAFAF8" stroke="#E2E1DC" stroke-width="1"/>
<rect x="40" y="433" width="132" height="22" rx="5" fill="#FFFFFF" stroke="#E2E1DC" stroke-width="1"/>
<text x="50" y="448" font-size="12.5" font-weight="600" fill="#3D3D3A">A7 · Bone vectors</text>

<!-- faint skeleton with bone-vector arrows -->
<use href="#skel" transform="translate(135,485) scale(0.85)" color="#CFCEC8"/>
<g stroke="#C2740F" stroke-width="2.4">
  <line x1="135" y1="502.9" x2="153.6" y2="506.3" marker-end="url(#arrs)"/>
  <line x1="153.6" y1="506.3" x2="164.5" y2="519.9" marker-end="url(#arrs)"/>
  <line x1="164.5" y1="519.9" x2="178.4" y2="498.6" marker-end="url(#arrs)"/>
  <line x1="135" y1="502.9" x2="116.4" y2="506.3" marker-end="url(#arrs)"/>
  <line x1="116.4" y1="506.3" x2="105.5" y2="530.1" marker-end="url(#arrs)"/>
  <line x1="135" y1="502.9" x2="136.7" y2="547.9" marker-end="url(#arrs)"/>
  <line x1="136.7" y1="547.9" x2="152.9" y2="583.9" marker-end="url(#arrs)"/>
  <line x1="136.7" y1="547.9" x2="117.2" y2="581.4" marker-end="url(#arrs)"/>
</g>
<text x="135" y="618" text-anchor="middle" font-size="10" font-style="italic" fill="#9A9992">arrows = child − parent along the COCO tree</text>

<!-- callout -->
<circle cx="330" cy="486" r="5" fill="#993C1D"/>
<text x="330" y="478" text-anchor="middle" font-size="9.5" fill="#6B6B66">parent</text>
<circle cx="392" cy="524" r="5" fill="#534AB7"/>
<text x="403" y="527" font-size="9.5" fill="#6B6B66">child</text>
<line x1="330" y1="486" x2="392" y2="524" stroke="#C2740F" stroke-width="2.6" marker-end="url(#arr)"/>
<text x="350" y="512" font-size="9.5" font-weight="600" fill="#C2740F" transform="rotate(31 350 512)">bone vector</text>

<text x="430" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#C2740F">node feature = child − parent</text>
<text x="430" y="496" text-anchor="middle" font-size="11" fill="#3D3D3A">= ( Δx, Δy )</text>
<rect x="394" y="506" width="72" height="19" rx="9" fill="#EAE0CE"/>
<text x="430" y="519" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8A5208">2-dim / joint</text>
<text x="430" y="546" text-anchor="middle" font-size="10" fill="#6B6B66">translation-invariant — the</text>
<text x="430" y="560" text-anchor="middle" font-size="10" fill="#6B6B66">vector is the same wherever</text>
<text x="430" y="574" text-anchor="middle" font-size="10" fill="#6B6B66">the player stands on court</text>
<text x="430" y="598" text-anchor="middle" font-size="9.5" font-style="italic" fill="#9A9992">tested as A7 (bones only) and</text>
<text x="430" y="611" text-anchor="middle" font-size="9.5" font-style="italic" fill="#9A9992">A8 (L3 + bones)</text>

