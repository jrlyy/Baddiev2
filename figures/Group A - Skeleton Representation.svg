<svg width="100%" viewBox="0 0 1120 690" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Group A — Skeleton Representation</title>
<desc>Top row: the cumulative L0 to L3 node-feature hierarchy, each layer adding features to every joint of the skeleton. Bottom row: two orthogonal alternative representations tested in Group A+, bone vectors and bounding-box normalisation.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrs" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- skeleton: 14 bones + racket + 15 joints, currentColor (no bbox) -->
  <g id="skel">
    <path d="M0 0L0 21 M0 21L-23 25 M0 21L23 25 M-23 25L-35 53 M-35 53L-39 78
             M23 25L35 41 M35 41L51 16 M0 21L2 74 M2 74L-16 76 M2 74L18 76
             M-16 76L-21 110 M-21 110L-25 145 M18 76L21 113 M21 113L23 147"
          fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="51" y1="16" x2="61" y2="6" stroke="currentColor" stroke-width="2.8"/>
    <ellipse cx="67" cy="0" rx="10.5" ry="7.5" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <g fill="currentColor" stroke="#FFFFFF" stroke-width="1.4">
      <circle cx="0" cy="0" r="8"/>
      <circle cx="0" cy="21" r="5"/>
      <circle cx="-23" cy="25" r="5"/><circle cx="23" cy="25" r="5"/>
      <circle cx="-35" cy="53" r="5"/><circle cx="35" cy="41" r="5"/>
      <circle cx="-39" cy="78" r="5"/><circle cx="51" cy="16" r="5"/>
      <circle cx="2" cy="74" r="5"/>
      <circle cx="-16" cy="76" r="5"/><circle cx="18" cy="76" r="5"/>
      <circle cx="-21" cy="110" r="5"/><circle cx="21" cy="113" r="5"/>
      <circle cx="-25" cy="145" r="5"/><circle cx="23" cy="147" r="5"/>
    </g>
  </g>
</defs>

<!-- ===== Header ===== -->
<text x="560" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#141413">Group A — Skeleton Representation</text>
<text x="560" y="53" text-anchor="middle" font-size="13" font-style="italic" fill="#6B6B66">Cumulative node-feature depth (L0–L3) and the alternative representations of Group A+</text>

<text x="30" y="68" font-size="12.5" font-weight="700" fill="#3D3D3A">Feature-layer hierarchy — each layer appends to every joint's vector</text>

<!-- ============================================================ -->
<!-- L0 · Position                                                -->
<!-- ============================================================ -->
<rect x="30" y="84" width="248" height="318" rx="6" fill="#FAFAF8" stroke="#E2E1DC" stroke-width="1"/>
<rect x="40" y="73" width="96" height="22" rx="5" fill="#FFFFFF" stroke="#E2E1DC" stroke-width="1"/>
<text x="50" y="88" font-size="12.5" font-weight="600" fill="#3D3D3A">L0 · Position</text>

<use href="#skel" transform="translate(122,108) scale(0.66)" color="#534AB7"/>
<!-- highlight one joint -->
<circle cx="155.7" cy="118.6" r="9" fill="none" stroke="#8B8B85" stroke-width="1.6"/>
<line x1="146.7" y1="118.6" x2="164.7" y2="118.6" stroke="#8B8B85" stroke-width="0.8"/>
<line x1="155.7" y1="109.6" x2="155.7" y2="127.6" stroke="#8B8B85" stroke-width="0.8"/>
<line x1="190" y1="118.6" x2="167" y2="118.6" stroke="#8B8B85" stroke-width="1.2" marker-end="url(#arrs)"/>
<text x="193" y="122" font-size="11" font-weight="600" fill="#5A5A55">(x, y)</text>

<!-- feature chip bar -->
<rect x="58" y="232" width="192" height="15" rx="3" fill="#EEEEE9"/>
<rect x="58" y="232" width="27.4" height="15" rx="3" fill="#8B8B85"/>
<text x="71.7" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">x,y</text>

<text x="154" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#5A5A55">raw joint coordinates</text>
<text x="154" y="292" text-anchor="middle" font-size="11" fill="#3D3D3A">
  <tspan fill="#8B8B85">[ x, y ]</tspan>
</text>
<rect x="118" y="305" width="72" height="19" rx="9" fill="#EFEFEA"/>
<text x="154" y="318" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5A5A55">2-dim / joint</text>
<text x="154" y="350" text-anchor="middle" font-size="10" font-style="italic" fill="#9A9992">where each joint is</text>

<!-- ============================================================ -->
