<text x="958" y="611" text-anchor="middle" font-size="9.5" fill="#6B6B66">count, scale-invariant coords</text>

<!-- ===== footer ===== -->
<text x="560" y="682" text-anchor="middle" font-size="10.5" fill="#6B6B66">L0–L3 add cumulative depth to every joint's vector  ·  bone vectors and bbox-norm are orthogonal swaps tested in Group A+, not additional layers</text>

</svg>
