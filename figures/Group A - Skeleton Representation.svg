<!-- ============================================================ -->
<rect x="300" y="84" width="248" height="318" rx="6" fill="#FAFAF8" stroke="#E2E1DC" stroke-width="1"/>
<rect x="310" y="73" width="112" height="22" rx="5" fill="#FFFFFF" stroke="#E2E1DC" stroke-width="1"/>
<text x="320" y="88" font-size="12.5" font-weight="600" fill="#3D3D3A">L1 · Kinematics</text>

<use href="#skel" transform="translate(392,108) scale(0.66)" color="#534AB7"/>
<!-- velocity / acceleration arrows -->
<g stroke="#2F6FB3">
  <line x1="425.7" y1="118.6" x2="441" y2="109" stroke-width="2" marker-end="url(#arrs)"/>
  <line x1="366.3" y1="159.5" x2="353" y2="170" stroke-width="2" marker-end="url(#arrs)"/>
  <line x1="405.9" y1="182.6" x2="416" y2="194" stroke-width="2" marker-end="url(#arrs)"/>
  <line x1="392" y1="108" x2="398" y2="96" stroke-width="2" marker-end="url(#arrs)"/>
</g>
<text x="455" y="150" font-size="11" font-weight="600" fill="#2F6FB3">v, a</text>
<line x1="452" y1="146" x2="430" y2="135" stroke="#2F6FB3" stroke-width="1" marker-end="url(#arrs)"/>

<rect x="328" y="232" width="192" height="15" rx="3" fill="#EEEEE9"/>
<rect x="328" y="232" width="27.4" height="15" rx="3" fill="#8B8B85"/>
<rect x="355.4" y="232" width="54.9" height="15" rx="3" fill="#2F6FB3"/>
<text x="341.7" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">x,y</text>
<text x="382.8" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">v, a</text>

<text x="424" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#2F6FB3">+ velocity &amp; acceleration</text>
<text x="424" y="292" text-anchor="middle" font-size="11" fill="#3D3D3A">
  <tspan fill="#8B8B85">[ x, y,</tspan><tspan fill="#2F6FB3"> vx, vy, ax, ay ]</tspan>
</text>
<rect x="388" y="305" width="72" height="19" rx="9" fill="#EFEFEA"/>
<text x="424" y="318" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5A5A55">6-dim / joint</text>
<text x="424" y="350" text-anchor="middle" font-size="10" font-style="italic" fill="#9A9992">how each joint moves</text>

<!-- ============================================================ -->
<!-- L2 · Court context                                           -->
<!-- ============================================================ -->
<rect x="570" y="84" width="248" height="318" rx="6" fill="#FAFAF8" stroke="#E2E1DC" stroke-width="1"/>
<rect x="580" y="73" width="128" height="22" rx="5" fill="#FFFFFF" stroke="#E2E1DC" stroke-width="1"/>
