<rect x="571" y="444" width="519" height="220" rx="6" fill="#FAFAF8" stroke="#E2E1DC" stroke-width="1"/>
<rect x="581" y="433" width="166" height="22" rx="5" fill="#FFFFFF" stroke="#E2E1DC" stroke-width="1"/>
<text x="591" y="448" font-size="12.5" font-weight="600" fill="#3D3D3A">A9 · bbox normalisation</text>

