<line x1="588" y1="104" x2="800" y2="104" stroke="#B7B6AF" stroke-width="1.1" stroke-dasharray="5 4"/>
<text x="797" y="100" text-anchor="end" font-size="9" fill="#9A9992">net</text>
<circle cx="748" cy="120" r="4" fill="#993C1D"/>
<text x="756" y="123" font-size="9" fill="#993C1D">opponent</text>

<use href="#skel" transform="translate(648,116) scale(0.66)" color="#534AB7"/>
<!-- distance lines from hitter centroid -->
<g stroke="#0F6E56" stroke-width="1.3" stroke-dasharray="3.5 3">
  <line x1="649.3" y1="164.8" x2="649.3" y2="106"/>
  <line x1="649.3" y1="164.8" x2="745" y2="122"/>
</g>
<text x="624" y="138" font-size="9.5" font-weight="600" fill="#0F6E56">d_net</text>
<text x="690" y="156" font-size="9.5" font-weight="600" fill="#0F6E56">δ to opp.</text>

<rect x="598" y="232" width="192" height="15" rx="3" fill="#EEEEE9"/>
<rect x="598" y="232" width="27.4" height="15" rx="3" fill="#8B8B85"/>
<rect x="625.4" y="232" width="54.9" height="15" rx="3" fill="#2F6FB3"/>
<rect x="680.3" y="232" width="54.9" height="15" rx="3" fill="#0F6E56"/>
<text x="611.7" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">x,y</text>
<text x="652.8" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">v, a</text>
<text x="707.8" y="243.5" text-anchor="middle" font-size="8.5" font-weight="600" fill="#FFFFFF">court d</text>

<text x="694" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#0F6E56">+ court distances (metres)</text>
<text x="694" y="292" text-anchor="middle" font-size="11" fill="#3D3D3A">
  <tspan fill="#8B8B85">[ …,</tspan><tspan fill="#0F6E56"> d_net, d_ctr, δ_depth, δ_lat ]</tspan>
</text>
<rect x="658" y="305" width="72" height="19" rx="9" fill="#EFEFEA"/>
<text x="694" y="318" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5A5A55">10-dim / joint</text>
<text x="694" y="350" text-anchor="middle" font-size="10" font-style="italic" fill="#9A9992">where the player is on court</text>

<!-- ============================================================ -->
<!-- L3 · Joint angles                                            -->
<!-- ============================================================ -->
<rect x="840" y="84" width="248" height="318" rx="6" fill="#FAFAF8" stroke="#E2E1DC" stroke-width="1"/>
<rect x="850" y="73" width="122" height="22" rx="5" fill="#FFFFFF" stroke="#E2E1DC" stroke-width="1"/>
<text x="860" y="88" font-size="12.5" font-weight="600" fill="#3D3D3A">L3 · Joint angles</text>

