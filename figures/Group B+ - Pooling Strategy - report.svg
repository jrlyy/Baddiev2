<svg width="100%" viewBox="0 0 1080 178" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Pooling strategies</title>
<desc>Four ways to collapse the ST-GCN feature map into one shot embedding: uniform mean, element-wise max, learned attention weights, and a temporal transformer with a CLS read-out token.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- (a) Mean pool -->
<text x="148.5" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(a) Mean pool · winner</text>
<rect x="100.5" y="36" width="96" height="64" fill="#D4E1D9" stroke="#9DB0A4" stroke-width="1"/>
<g stroke="#B7C7BD" stroke-width="0.8">
  <line x1="116.5" y1="36" x2="116.5" y2="100"/><line x1="132.5" y1="36" x2="132.5" y2="100"/>
  <line x1="148.5" y1="36" x2="148.5" y2="100"/><line x1="164.5" y1="36" x2="164.5" y2="100"/>
  <line x1="180.5" y1="36" x2="180.5" y2="100"/>
  <line x1="100.5" y1="52" x2="196.5" y2="52"/><line x1="100.5" y1="68" x2="196.5" y2="68"/>
  <line x1="100.5" y1="84" x2="196.5" y2="84"/>
</g>
<text x="148.5" y="118" text-anchor="middle" font-size="9.5" fill="#6B6B66">average — every cell equal</text>
<line x1="148.5" y1="122" x2="148.5" y2="136" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="93.5" y="138" width="110" height="16" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<g stroke="#9B93D4" stroke-width="0.7"><line x1="115.5" y1="138" x2="115.5" y2="154"/><line x1="137.5" y1="138" x2="137.5" y2="154"/><line x1="159.5" y1="138" x2="159.5" y2="154"/><line x1="181.5" y1="138" x2="181.5" y2="154"/></g>
<text x="148.5" y="168" text-anchor="middle" font-size="9" fill="#8A8A84">256-d embedding</text>

<!-- (b) Max pool -->
<text x="409.5" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(b) Max pool</text>
<rect x="361.5" y="36" width="96" height="64" fill="#ECF1EE" stroke="#9DB0A4" stroke-width="1"/>
<g fill="#534AB7">
  <rect x="377.5" y="36" width="16" height="16"/><rect x="425.5" y="52" width="16" height="16"/>
  <rect x="361.5" y="84" width="16" height="16"/><rect x="409.5" y="68" width="16" height="16"/>
</g>
<g stroke="#B7C7BD" stroke-width="0.8">
  <line x1="377.5" y1="36" x2="377.5" y2="100"/><line x1="393.5" y1="36" x2="393.5" y2="100"/>
  <line x1="409.5" y1="36" x2="409.5" y2="100"/><line x1="425.5" y1="36" x2="425.5" y2="100"/>
  <line x1="441.5" y1="36" x2="441.5" y2="100"/>
  <line x1="361.5" y1="52" x2="457.5" y2="52"/><line x1="361.5" y1="68" x2="457.5" y2="68"/>
  <line x1="361.5" y1="84" x2="457.5" y2="84"/>
</g>
<text x="409.5" y="118" text-anchor="middle" font-size="9.5" fill="#6B6B66">keep peak activation per channel</text>
<line x1="409.5" y1="122" x2="409.5" y2="136" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="354.5" y="138" width="110" height="16" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<g stroke="#9B93D4" stroke-width="0.7"><line x1="376.5" y1="138" x2="376.5" y2="154"/><line x1="398.5" y1="138" x2="398.5" y2="154"/><line x1="420.5" y1="138" x2="420.5" y2="154"/><line x1="442.5" y1="138" x2="442.5" y2="154"/></g>
<text x="409.5" y="168" text-anchor="middle" font-size="9" fill="#8A8A84">256-d embedding</text>

