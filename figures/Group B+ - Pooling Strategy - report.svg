<line x1="670.5" y1="122" x2="670.5" y2="136" stroke="#7A7A74" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="615.5" y="138" width="110" height="16" rx="4" fill="#ECEAF7" stroke="#9B93D4" stroke-width="1.2"/>
<g stroke="#9B93D4" stroke-width="0.7"><line x1="637.5" y1="138" x2="637.5" y2="154"/><line x1="659.5" y1="138" x2="659.5" y2="154"/><line x1="681.5" y1="138" x2="681.5" y2="154"/><line x1="703.5" y1="138" x2="703.5" y2="154"/></g>
<text x="670.5" y="168" text-anchor="middle" font-size="9" fill="#8A8A84">256-d embedding</text>

<!-- (d) Temporal transformer -->
<text x="931.5" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">(d) Temporal transformer</text>
<rect x="869.5" y="38" width="84" height="56" fill="#ECF1EE" stroke="#9DB0A4" stroke-width="1"/>
<g stroke="#B7C7BD" stroke-width="0.8">
  <line x1="883.5" y1="38" x2="883.5" y2="94"/><line x1="897.5" y1="38" x2="897.5" y2="94"/>
  <line x1="911.5" y1="38" x2="911.5" y2="94"/><line x1="925.5" y1="38" x2="925.5" y2="94"/>
  <line x1="939.5" y1="38" x2="939.5" y2="94"/>
  <line x1="869.5" y1="52" x2="953.5" y2="52"/><line x1="869.5" y1="66" x2="953.5" y2="66"/>
