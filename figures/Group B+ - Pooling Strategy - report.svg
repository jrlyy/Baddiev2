  <rect x="622.5" y="52" width="16" height="16" fill-opacity="0.55"/><rect x="638.5" y="52" width="16" height="16" fill-opacity="0.90"/><rect x="654.5" y="52" width="16" height="16" fill-opacity="0.35"/><rect x="670.5" y="52" width="16" height="16" fill-opacity="0.60"/><rect x="686.5" y="52" width="16" height="16" fill-opacity="0.25"/><rect x="702.5" y="52" width="16" height="16" fill-opacity="0.40"/>
  <rect x="622.5" y="68" width="16" height="16" fill-opacity="0.20"/><rect x="638.5" y="68" width="16" height="16" fill-opacity="0.45"/><rect x="654.5" y="68" width="16" height="16" fill-opacity="0.70"/><rect x="670.5" y="68" width="16" height="16" fill-opacity="0.30"/><rect x="686.5" y="68" width="16" height="16" fill-opacity="0.80"/><rect x="702.5" y="68" width="16" height="16" fill-opacity="0.35"/>
  <rect x="622.5" y="84" width="16" height="16" fill-opacity="0.40"/><rect x="638.5" y="84" width="16" height="16" fill-opacity="0.25"/><rect x="654.5" y="84" width="16" height="16" fill-opacity="0.55"/><rect x="670.5" y="84" width="16" height="16" fill-opacity="0.35"/><rect x="686.5" y="84" width="16" height="16" fill-opacity="0.50"/><rect x="702.5" y="84" width="16" height="16" fill-opacity="0.20"/>
</g>
<rect x="622.5" y="36" width="96" height="64" fill="none" stroke="#9DB0A4" stroke-width="1"/>
