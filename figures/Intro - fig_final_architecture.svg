<svg width="100%" viewBox="0 0 1100 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Run 6 final model architecture</title>
<desc>Final winning configuration: single-player L3 skeleton input through a 9-block ST-GCN encoder with mean pooling, fused with the shuttle trajectory via cross-attention, then a classifier head. Panels (b) and (c) decompose the spatial graph-conv and temporal-conv modules inside each ST-GCN block.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrThin" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <linearGradient id="tens" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#8a96aa"/><stop offset="1" stop-color="#5a6878"/>
  </linearGradient>
</defs>

<style>
  text { font-family: system-ui, -apple-system, sans-serif; fill: #222; }
  .panel { font-size: 13px; font-weight: 700; }
  .lbl   { font-size: 11px; }
  .small { font-size: 10px; fill: #666; }
  .ital  { font-size: 10px; fill: #666; font-style: italic; }
  .box   { font-size: 12px; font-weight: 600; }
</style>

<text x="20" y="24" class="panel">Run 6 — final model architecture (winning configuration)</text>
<line x1="20" y1="32" x2="1080" y2="32" stroke="#ccc" stroke-width="1"/>

<!-- ===================== (a) Overall pipeline ===================== -->
<g transform="translate(0,40)">

  <!-- Input tensor -->
  <g transform="translate(45,40)">
    <polygon points="20,0 200,0 220,-18 40,-18" fill="#9aa6b8" stroke="#3b475a" stroke-width="0.8"/>
    <polygon points="200,0 220,-18 220,42 200,60" fill="#5a6878" stroke="#3b475a" stroke-width="0.8"/>
    <rect x="20" y="0" width="180" height="60" fill="url(#tens)" stroke="#3b475a" stroke-width="0.8"/>
    <text x="-6" y="34" class="lbl" text-anchor="end">C = 14</text>
    <text x="110" y="-26" class="lbl" text-anchor="middle">T = 32 frames</text>
    <text x="234" y="22" class="lbl">V = 17</text>
    <text x="110" y="80" class="ital" text-anchor="middle">single hitter · L3 features · ±16-frame window</text>
  </g>

  <line x1="165" y1="128" x2="165" y2="158" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="172" y="148" class="small">BatchNorm (input)</text>

  <!-- ST-GCN block stack -->
  <rect x="60" y="162" width="210" height="178" rx="10" fill="none" stroke="#534AB7" stroke-width="1.1" stroke-dasharray="5 3"/>
  <text x="165" y="181" text-anchor="middle" class="box" fill="#534AB7">ST-GCN Encoder — Block × 9</text>

  <rect x="88" y="192" width="154" height="34" rx="6" fill="#cfe1f4" stroke="#3a6ea8" stroke-width="1"/>
  <text x="165" y="213" text-anchor="middle" class="box" fill="#0f3458">Spatial Module (b)</text>

  <rect x="88" y="234" width="154" height="34" rx="6" fill="#3a6ea8" stroke="#22436b" stroke-width="1"/>
  <text x="165" y="255" text-anchor="middle" class="box" fill="#fff">Temporal Module (c)</text>

  <line x1="165" y1="226" x2="165" y2="233" stroke="#444" stroke-width="1.3" marker-end="url(#arrThin)"/>
  <line x1="165" y1="268" x2="165" y2="284" stroke="#444" stroke-width="1.3" marker-end="url(#arrThin)"/>

  <circle cx="165" cy="296" r="9" fill="#fff" stroke="#444" stroke-width="1.2"/>
  <text x="165" y="300" text-anchor="middle" font-size="12">+</text>
  <path d="M58 209 Q42 209 42 296 Q42 296 155 296" fill="none" stroke="#666" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrThin)"/>
  <text x="36" y="250" class="small" transform="rotate(-90 36 250)" text-anchor="middle">residual</text>

  <text x="252" y="207" class="small">channels</text>
  <text x="252" y="221" class="small">64 ×3</text>
  <text x="252" y="234" class="small">128 ×3</text>
  <text x="252" y="247" class="small">256 ×3</text>
  <text x="252" y="265" class="ital" fill="#7a4a1a">stride 2</text>
  <text x="252" y="278" class="ital" fill="#7a4a1a">@ L3,L6</text>
  <text x="252" y="291" class="ital" fill="#7a4a1a">T:32→8</text>

  <line x1="165" y1="340" x2="165" y2="357" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="172" y="352" class="small">(256, T'=8, V=17)</text>

  <!-- Mean pooling -->
  <rect x="85" y="360" width="160" height="32" rx="6" fill="#9DB9E6" stroke="#3C5FA0" stroke-width="1"/>
  <text x="165" y="380" text-anchor="middle" class="box" fill="#1a2d5a">Mean Pooling (T,V)</text>

  <line x1="165" y1="392" x2="165" y2="408" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="172" y="403" class="small">skel_emb (256)</text>

  <!-- Cross-attention -->
  <rect x="65" y="411" width="200" height="42" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="165" y="429" text-anchor="middle" class="box" fill="#04342c">Shuttle Cross-Attention</text>
  <text x="165" y="444" text-anchor="middle" class="small" fill="#04342c">Q = skel_emb,  K,V = ShuttleTCN(s)</text>

  <line x1="165" y1="453" x2="165" y2="469" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="172" y="464" class="small">fused emb (256)</text>

  <!-- Head -->
  <rect x="100" y="472" width="130" height="30" rx="6" fill="#E07550" stroke="#993C1D" stroke-width="1"/>
  <text x="165" y="492" text-anchor="middle" class="box" fill="#3a1206">FC → ŷ  (shot class)</text>

  <!-- Shuttle branch -->
  <g transform="translate(300,55)">
    <rect x="0" y="0" width="86" height="38" rx="5" fill="#c8e0ce" stroke="#3a7a55" stroke-width="0.9"/>
    <text x="43" y="17" text-anchor="middle" class="box" fill="#143924" font-size="11">Shuttle traj</text>
    <text x="43" y="32" text-anchor="middle" class="small" fill="#143924">(2 × 32)</text>
  </g>
  <line x1="343" y1="93" x2="343" y2="350" stroke="#3a7a55" stroke-width="1.2" stroke-dasharray="3 2"/>
  <g transform="translate(300,353)">
    <rect x="0" y="0" width="86" height="34" rx="5" fill="#a8c9b3" stroke="#3a7a55" stroke-width="0.9"/>
    <text x="43" y="16" text-anchor="middle" class="box" fill="#143924" font-size="11">ShuttleTCN</text>
    <text x="43" y="29" text-anchor="middle" class="small" fill="#143924">Conv1d×3, d=128</text>
  </g>
  <path d="M343 387 L343 425 L268 432" fill="none" stroke="#3a7a55" stroke-width="1.4" marker-end="url(#arr)"/>

  <text x="200" y="535" text-anchor="middle" class="panel">(a) Overall pipeline</text>
</g>

<!-- ===================== (b) Spatial Module ===================== -->
<g transform="translate(430,40)">
  <g transform="translate(40,40)">
    <polygon points="20,0 180,0 198,-16 38,-16" fill="#9aa6b8" stroke="#3b475a" stroke-width="0.8"/>
    <polygon points="180,0 198,-16 198,38 180,54" fill="#5a6878" stroke="#3b475a" stroke-width="0.8"/>
    <rect x="20" y="0" width="160" height="54" fill="url(#tens)" stroke="#3b475a" stroke-width="0.8"/>
    <text x="100" y="-24" class="lbl" text-anchor="middle">T</text>
    <text x="210" y="20" class="lbl">V</text>
    <text x="100" y="72" class="ital" text-anchor="middle">for each frame t_i ∈ {1,…,T}</text>
  </g>

  <line x1="130" y1="116" x2="130" y2="146" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- adjacency heatmap -->
  <g transform="translate(20,158)">
    <text x="48" y="-5" text-anchor="middle" class="lbl">V</text>
    <text x="-11" y="50" text-anchor="middle" class="lbl">V</text>
    <g>
      <rect x="0"  y="0"  width="16" height="16" fill="#f4a261"/><rect x="16" y="0"  width="16" height="16" fill="#e07a3c"/><rect x="32" y="0"  width="16" height="16" fill="#aac6e7"/><rect x="48" y="0"  width="16" height="16" fill="#5a85b8"/><rect x="64" y="0"  width="16" height="16" fill="#f4a261"/><rect x="80" y="0"  width="16" height="16" fill="#e07a3c"/>
      <rect x="0"  y="16" width="16" height="16" fill="#5a85b8"/><rect x="16" y="16" width="16" height="16" fill="#f4a261"/><rect x="32" y="16" width="16" height="16" fill="#e07a3c"/><rect x="48" y="16" width="16" height="16" fill="#aac6e7"/><rect x="64" y="16" width="16" height="16" fill="#5a85b8"/><rect x="80" y="16" width="16" height="16" fill="#f4a261"/>
      <rect x="0"  y="32" width="16" height="16" fill="#aac6e7"/><rect x="16" y="32" width="16" height="16" fill="#5a85b8"/><rect x="32" y="32" width="16" height="16" fill="#f4a261"/><rect x="48" y="32" width="16" height="16" fill="#e07a3c"/><rect x="64" y="32" width="16" height="16" fill="#aac6e7"/><rect x="80" y="32" width="16" height="16" fill="#5a85b8"/>
      <rect x="0"  y="48" width="16" height="16" fill="#e07a3c"/><rect x="16" y="48" width="16" height="16" fill="#aac6e7"/><rect x="32" y="48" width="16" height="16" fill="#5a85b8"/><rect x="48" y="48" width="16" height="16" fill="#f4a261"/><rect x="64" y="48" width="16" height="16" fill="#e07a3c"/><rect x="80" y="48" width="16" height="16" fill="#aac6e7"/>
      <rect x="0"  y="64" width="16" height="16" fill="#f4a261"/><rect x="16" y="64" width="16" height="16" fill="#e07a3c"/><rect x="32" y="64" width="16" height="16" fill="#aac6e7"/><rect x="48" y="64" width="16" height="16" fill="#5a85b8"/><rect x="64" y="64" width="16" height="16" fill="#f4a261"/><rect x="80" y="64" width="16" height="16" fill="#e07a3c"/>
      <rect x="0"  y="80" width="16" height="16" fill="#5a85b8"/><rect x="16" y="80" width="16" height="16" fill="#f4a261"/><rect x="32" y="80" width="16" height="16" fill="#e07a3c"/><rect x="48" y="80" width="16" height="16" fill="#aac6e7"/><rect x="64" y="80" width="16" height="16" fill="#5a85b8"/><rect x="80" y="80" width="16" height="16" fill="#f4a261"/>
    </g>
    <text x="108" y="52" font-size="15">⊗</text>
  </g>

  <!-- feature matrix -->
  <g transform="translate(150,158)">
    <text x="32" y="-5" text-anchor="middle" class="lbl">C</text>
    <text x="-11" y="50" text-anchor="middle" class="lbl">V</text>
    <rect x="0"  y="0" width="16" height="96" fill="#aac6e7"/><rect x="16" y="0" width="16" height="96" fill="#5a85b8"/><rect x="32" y="0" width="16" height="96" fill="#f4a261"/><rect x="48" y="0" width="16" height="96" fill="#e07a3c"/>
    <text x="32" y="116" text-anchor="middle" class="small">feature x_{t_i}</text>
  </g>

  <g transform="translate(20,300)">
    <rect x="0" y="0" width="240" height="30" rx="6" fill="#eef1f5" stroke="#7d8a9c" stroke-width="0.6"/>
    <text x="120" y="20" text-anchor="middle" font-size="11.5" fill="#1a2a3a">x'_{t_i} = Σ_k (α_k · A_k) · h_k(x_{t_i})</text>
  </g>
  <text x="130" y="350" text-anchor="middle" class="ital">K adjacency subsets + learnable edge importance α_k</text>
  <text x="130" y="365" text-anchor="middle" class="ital">1×1 conv expands C → K·C_out, then aggregate over joints</text>

  <text x="135" y="535" text-anchor="middle" class="panel">(b) Spatial Module — graph conv</text>
</g>

<!-- ===================== (c) Temporal Module ===================== -->
<g transform="translate(760,40)">
  <g transform="translate(40,40)">
    <polygon points="20,0 180,0 198,-16 38,-16" fill="#9aa6b8" stroke="#3b475a" stroke-width="0.8"/>
    <polygon points="180,0 198,-16 198,38 180,54" fill="#5a6878" stroke="#3b475a" stroke-width="0.8"/>
    <rect x="20" y="0" width="160" height="54" fill="url(#tens)" stroke="#3b475a" stroke-width="0.8"/>
    <text x="100" y="-24" class="lbl" text-anchor="middle">T</text>
    <text x="210" y="20" class="lbl">V</text>
    <text x="100" y="72" class="ital" text-anchor="middle">for each joint v_i ∈ {1,…,V}</text>
  </g>

  <line x1="130" y1="116" x2="130" y2="146" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- input time-series T x C -->
  <g transform="translate(25,158)">
    <text x="32" y="-5" text-anchor="middle" class="lbl">C</text>
    <text x="-12" y="8" text-anchor="middle" class="small">t_1</text>
    <text x="-12" y="128" text-anchor="middle" class="small">t_T</text>
    <rect x="0" y="0" width="16" height="130" fill="#aac6e7"/><rect x="16" y="0" width="16" height="130" fill="#5a85b8"/><rect x="32" y="0" width="16" height="130" fill="#7ba4cd"/><rect x="48" y="0" width="16" height="130" fill="#4a76a8"/>
  </g>

  <!-- conv kernel -->
  <g transform="translate(112,195)">
    <rect x="0" y="0" width="40" height="60" rx="4" fill="#fff" stroke="#444" stroke-width="1"/>
    <text x="20" y="22" text-anchor="middle" class="small" fill="#444">1D</text>
    <text x="20" y="36" text-anchor="middle" class="small" fill="#444">Conv</text>
    <text x="20" y="50" text-anchor="middle" class="small" fill="#666">k = 9</text>
  </g>
  <g stroke="#999" stroke-width="0.7" stroke-dasharray="2 2" fill="none">
    <line x1="89" y1="170" x2="112" y2="205"/>
    <line x1="89" y1="215" x2="112" y2="222"/>
    <line x1="89" y1="260" x2="112" y2="240"/>
    <line x1="89" y1="290" x2="112" y2="255"/>
    <line x1="152" y1="215" x2="178" y2="195"/>
    <line x1="152" y1="225" x2="178" y2="235"/>
    <line x1="152" y1="235" x2="178" y2="275"/>
  </g>

  <!-- output time-series T' x C -->
  <g transform="translate(178,178)">
    <text x="32" y="-5" text-anchor="middle" class="lbl">C</text>
    <text x="-13" y="8" text-anchor="middle" class="small">t_1</text>
    <text x="-13" y="98" text-anchor="middle" class="small">t_T'</text>
    <rect x="0" y="0" width="16" height="100" fill="#7892ad"/><rect x="16" y="0" width="16" height="100" fill="#5b7796"/><rect x="32" y="0" width="16" height="100" fill="#9bb1c9"/><rect x="48" y="0" width="16" height="100" fill="#3f5a78"/>
    <text x="32" y="118" text-anchor="middle" class="small">feature x_{v_i}</text>
  </g>

  <g transform="translate(20,320)">
    <rect x="0" y="0" width="245" height="30" rx="6" fill="#eef1f5" stroke="#7d8a9c" stroke-width="0.6"/>
    <text x="122" y="20" text-anchor="middle" font-size="11.5" fill="#1a2a3a">x'_{v_i} = Conv1D_t(x_{v_i};  k=9,  s∈{1,2})</text>
  </g>
  <text x="132" y="370" text-anchor="middle" class="ital">BN → Dropout; stride 2 halves T at blocks 3 &amp; 6 (32 → 16 → 8)</text>

  <text x="135" y="535" text-anchor="middle" class="panel">(c) Temporal Module — temporal conv</text>
</g>

</svg>
